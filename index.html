<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --surface:#1a1a2e;
  --border:#1e1e2e;
  --accent:#00ff9d;
  --text:#e0e0e0;
  --dim:#888;
  --red:#ff4d6a;
  --yellow:#ffd700;
  --green:#00ff9d;
  --purple:#a78bfa;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.hidden{display:none!important}

/* ===== Login ===== */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:92%;max-width:420px;text-align:center}
.login-box h1{color:var(--accent);margin-bottom:8px;font-size:24px}
.login-box .sub{color:var(--dim);margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;direction:ltr;text-align:left}
.login-box input::placeholder{color:#555}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.85}
.login-box .helper{margin-top:12px;font-size:11px;color:var(--dim)}
.login-box .helper a{color:var(--accent);font-size:11px}

/* ===== Top Bar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;color:var(--accent)}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.topbar-actions select,.topbar-actions button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer}
.topbar-actions button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.topbar-actions button:hover{opacity:.85}

/* ===== Metrics ===== */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 24px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.metric-card .label{font-size:12px;color:var(--dim);margin-bottom:4px}
.metric-card .value{font-size:22px;font-weight:700;color:var(--accent)}

/* ===== View Toggle ===== */
.view-toggle{display:flex;gap:8px;padding:0 24px 12px;justify-content:flex-start}
.view-toggle button{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:13px;transition:.15s}
.view-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* ===== Cards Grid ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 24px 24px}
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.ad-card:hover{transform:translateY(-3px);border-color:var(--accent)}
.ad-card .thumb{width:100%;height:180px;object-fit:cover;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--dim);overflow:hidden}
.ad-card .thumb img{width:100%;height:100%;object-fit:cover}
.ad-card .badge-status{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.ad-card .badge-roas{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(0,0,0,.65);color:#fff;backdrop-filter:blur(8px)}
.ad-card .badge-carousel{position:absolute;top:42px;left:10px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;background:rgba(120,80,255,.75);color:#fff;backdrop-filter:blur(8px)}
.ad-card .badge-source{position:absolute;bottom:186px;left:10px;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.5px;backdrop-filter:blur(8px)}
.badge-source-preview{background:rgba(0,255,157,.25);color:var(--green)}
.badge-source-asset{background:rgba(255,255,255,.12);color:var(--dim)}
.badge-win{background:rgba(0,255,157,.2);color:var(--green)}
.badge-ok{background:rgba(255,215,0,.2);color:var(--yellow)}
.badge-stop{background:rgba(255,77,106,.2);color:var(--red)}
.badge-new{background:rgba(255,255,255,.15);color:#ccc}
.ad-card .info{padding:14px}
.ad-card .info .name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .adset{font-size:11px;color:var(--dim);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ad-card .info .stats .stat{font-size:12px}
.ad-card .info .stats .stat span{color:var(--dim)}

/* ===== Table ===== */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:var(--card);padding:10px 12px;text-align:right;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
.table-wrap td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.table-wrap tr:hover{background:rgba(0,255,157,.03)}
.table-wrap .thumb-cell{width:50px;height:50px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surface);font-size:20px;position:relative}
.table-wrap .thumb-cell img{width:100%;height:100%;object-fit:cover}
.table-wrap .carousel-mini{position:absolute;bottom:2px;left:2px;font-size:8px;background:rgba(120,80,255,.85);color:#fff;padding:1px 4px;border-radius:4px;font-weight:700}
.table-wrap .source-mini{position:absolute;top:2px;left:2px;font-size:7px;padding:1px 3px;border-radius:3px;font-weight:700}
.source-mini-preview{background:rgba(0,255,157,.3);color:var(--green)}
.source-mini-asset{background:rgba(255,255,255,.15);color:var(--dim)}

/* ===== Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:900;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal .close-btn{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--dim);font-size:28px;cursor:pointer;z-index:10;line-height:1}
.modal .close-btn:hover{color:var(--text)}
.modal .modal-img{width:100%;max-height:300px;object-fit:contain;border-radius:8px;margin-bottom:16px;background:var(--surface)}
.modal .modal-title{font-size:18px;font-weight:700;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--dim);margin-bottom:16px}
.modal .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal .modal-stats .ms{background:var(--surface);padding:12px;border-radius:8px}
.modal .modal-stats .ms .ms-label{font-size:11px;color:var(--dim)}
.modal .modal-stats .ms .ms-value{font-size:18px;font-weight:700}
.preview-label{font-size:12px;color:var(--dim);margin-bottom:6px;margin-top:8px}
.ad-preview-wrap{border-radius:8px;overflow:hidden;background:#fff;min-height:80px;position:relative}
.ad-preview-wrap iframe{width:100%;min-height:420px;border:none}
.ad-preview-wrap .pv-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);background:var(--surface);font-size:13px}

/* ===== Analysis ===== */
.analysis-btn{display:block;margin:0 24px 16px;padding:14px 24px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:calc(100% - 48px);transition:opacity .2s}
.analysis-btn:hover{opacity:.85}
.analysis-btn:disabled{opacity:.5;cursor:not-allowed}
.analysis-section{padding:0 24px 24px}
.analysis-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.analysis-box h3{color:var(--accent);margin-bottom:12px}
.analysis-box .analysis-content{white-space:pre-wrap;line-height:1.8;font-size:14px}

/* ===== Loading ===== */
.loading{text-align:center;padding:60px;color:var(--dim);font-size:16px}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Bottom Bar ===== */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;flex-wrap:wrap}
.bottombar select,.bottombar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer}
.bottombar button.danger{color:var(--red);border-color:rgba(255,77,106,.3)}
.bottombar button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.main-content{padding-bottom:65px}

/* ===== Sort ===== */
.sort-bar{padding:0 24px 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sort-bar label{font-size:12px;color:var(--dim)}
.sort-bar select{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer}

/* ===== Responsive ===== */
@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:16px}
  .modal{padding:16px}
  .modal .modal-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>Meta Ads Dashboard</h1>
    <div class="sub">הזיני את פרטי החיבור לחשבון המטא</div>
    <input type="password" id="inputToken" placeholder="Meta Access Token">
    <input type="text" id="inputAccount" placeholder="Ad Account ID" value="882300848610076">
    <input type="password" id="inputClaudeKey" placeholder="Claude API Key (אופציונלי)">
    <input type="text" id="inputWorkerUrl" placeholder="Cloudflare Worker URL (אופציונלי)">
    <button onclick="doLogin()">התחבר</button>
    <div class="helper">
      קבלי טוקן מ-<a href="https://developers.facebook.com/tools/explorer/" target="_blank">Meta Graph API Explorer</a>
    </div>
  </div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="topbar hidden" id="topbar">
  <h1>Meta Ads Dashboard</h1>
  <div class="topbar-actions">
    <select id="periodSelect">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">טען נתונים</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main-content hidden" id="mainContent">
  <div class="metrics" id="metricsBar"></div>
  <div class="view-toggle">
    <button class="active" id="btnCards" onclick="setView('cards')">כרטיסים</button>
    <button id="btnTable" onclick="setView('table')">טבלה</button>
  </div>
  <div class="sort-bar">
    <label>מיון:</label>
    <select id="sortSelect" onchange="applySort()">
      <option value="spend_desc">הוצאה (גבוה→נמוך)</option>
      <option value="spend_asc">הוצאה (נמוך→גבוה)</option>
      <option value="roas_desc">ROAS (גבוה→נמוך)</option>
      <option value="roas_asc">ROAS (נמוך→גבוה)</option>
      <option value="purchases_desc">המרות (גבוה→נמוך)</option>
      <option value="ctr_desc">CTR (גבוה→נמוך)</option>
    </select>
  </div>
  <div class="grid" id="cardsGrid"></div>
  <div class="table-wrap hidden" id="tableWrap"></div>
  <button class="analysis-btn" id="analysisBtn" onclick="runAnalysis()">🤖 ניתוח Claude AI</button>
  <div class="analysis-section hidden" id="analysisSection">
    <div class="analysis-box">
      <h3>🤖 ניתוח Claude AI</h3>
      <div class="analysis-content" id="analysisContent"></div>
    </div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('show')">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ===== BOTTOM BAR ===== -->
<div class="bottombar hidden" id="bottomBar">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select id="periodSelectBottom">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">🔄 רענן</button>
  </div>
  <button class="danger" onclick="doLogout()">🚪 התנתק</button>
</div>

<!-- ======================================================
     SINGLE SCRIPT BLOCK — ALL FUNCTIONS GLOBAL
     ====================================================== -->
<script>
/* ===========================================
   META ADS DASHBOARD — FULL REWRITE
   All functions are global (no modules).
   =========================================== */

/* ---------- Global State ---------- */
var TOKEN = '';
var ACCOUNT_ID = '';
var CLAUDE_KEY = '';
var WORKER_URL = '';
var adsData = [];
var currentView = 'cards';
var META_API = 'https://graph.facebook.com/v19.0';

/* ============================================
   1. LOGIN / LOGOUT / SESSION
   ============================================ */

function doLogin() {
  var t = document.getElementById('inputToken').value.trim();
  var a = document.getElementById('inputAccount').value.trim();
  var c = document.getElementById('inputClaudeKey').value.trim();
  var w = document.getElementById('inputWorkerUrl').value.trim().replace(/\/+$/, '');
  if (!t) { alert('יש להזין Access Token'); return; }
  if (!a) { alert('יש להזין Ad Account ID'); return; }
  TOKEN = t;
  ACCOUNT_ID = a;
  CLAUDE_KEY = c;
  WORKER_URL = w;
  sessionStorage.setItem('meta_token', t);
  sessionStorage.setItem('meta_account', a);
  if (c) sessionStorage.setItem('claude_key', c);
  if (w) sessionStorage.setItem('worker_url', w);
  showApp();
  fetchData();
}

function doLogout() {
  sessionStorage.clear();
  TOKEN = '';
  ACCOUNT_ID = '';
  CLAUDE_KEY = '';
  WORKER_URL = '';
  adsData = [];
  document.getElementById('loginOverlay').style.display = '';
  document.getElementById('topbar').classList.add('hidden');
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('bottomBar').classList.add('hidden');
  document.getElementById('analysisSection').classList.add('hidden');
  document.getElementById('inputToken').value = '';
  document.getElementById('inputClaudeKey').value = '';
  document.getElementById('inputWorkerUrl').value = '';
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('topbar').classList.remove('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('bottomBar').classList.remove('hidden');
}

function restoreSession() {
  var t = sessionStorage.getItem('meta_token');
  var a = sessionStorage.getItem('meta_account');
  if (!t || !a) return;
  TOKEN = t;
  ACCOUNT_ID = a;
  CLAUDE_KEY = sessionStorage.getItem('claude_key') || '';
  WORKER_URL = sessionStorage.getItem('worker_url') || '';
  document.getElementById('inputToken').value = t;
  document.getElementById('inputAccount').value = a;
  if (CLAUDE_KEY) document.getElementById('inputClaudeKey').value = CLAUDE_KEY;
  if (WORKER_URL) document.getElementById('inputWorkerUrl').value = WORKER_URL;
  showApp();
  fetchData();
}

/* ============================================
   2. SYNC PERIOD SELECTORS
   ============================================ */

function syncPeriods() {
  var top = document.getElementById('periodSelect');
  var bot = document.getElementById('periodSelectBottom');
  top.addEventListener('change', function() { bot.value = top.value; });
  bot.addEventListener('change', function() { top.value = bot.value; });
}

/* ============================================
   3. IMAGE PIPELINE — handles all ad types
   ============================================ */

function getCreativeImage(creative) {
  /* Priority 1: carousel — check object_story_spec first */
  var spec = creative.object_story_spec || null;
  if (spec) {
    var linkData = spec.link_data || null;
    if (linkData && linkData.child_attachments && linkData.child_attachments.length > 0) {
      var kids = linkData.child_attachments;
      var pic = kids[0].picture || kids[0].image_url || null;
      return { src: pic, type: 'carousel', count: kids.length };
    }
  }

  /* Priority 2: single image/video — thumbnail_url */
  if (creative.thumbnail_url) {
    return { src: creative.thumbnail_url, type: 'single', count: 0 };
  }

  /* Priority 3: fallback — image_url */
  if (creative.image_url) {
    return { src: creative.image_url, type: 'single', count: 0 };
  }

  return { src: null, type: 'unknown', count: 0 };
}

/* ============================================
   3b. EXTRACT PRIMARY IMAGE FROM RENDERED PREVIEW
   ============================================ */

function delay(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

function unwrapSafeImage(src) {
  if (!src) return src;
  try {
    if (src.toLowerCase().indexOf('safe_image.php') !== -1) {
      var u = new URL(src);
      var real = u.searchParams.get('url');
      if (real) return decodeURIComponent(real);
    }
  } catch(e) {}
  return src;
}

function isRejectUrl(src) {
  if (!src) return true;
  var s = src.toLowerCase();
  if (s.indexOf('data:') === 0) return true;
  if (s.indexOf('/rsrc.php') !== -1) return true;
  if (s.indexOf('emoji') !== -1) return true;
  if (s.indexOf('/images/reactions/') !== -1) return true;
  if (s.indexOf('/p16x16/') !== -1) return true;
  if (s.indexOf('/p32x32/') !== -1) return true;
  if (s.indexOf('/p50x50/') !== -1) return true;
  if (s.indexOf('tracking') !== -1) return true;
  if (s.indexOf('pixel') !== -1) return true;
  if (s.indexOf('beacon') !== -1) return true;
  if (s.indexOf('spacer') !== -1) return true;
  return false;
}

async function extractPrimaryImageFromRenderedPreview(previewHtml) {
  if (!previewHtml) return null;
  try {
    var iframe = document.createElement('iframe');
    iframe.setAttribute('style',
      'position:fixed;left:-99999px;top:0;width:500px;height:900px;opacity:0;pointer-events:none;');
    iframe.srcdoc = previewHtml;
    document.body.appendChild(iframe);

    /* Wait for iframe to load */
    await new Promise(function(resolve) {
      iframe.onload = resolve;
      /* Safety timeout in case onload never fires */
      setTimeout(resolve, 5000);
    });

    /* Extra delay so Meta preview JS can render content */
    await delay(1000);

    var iframeDoc = null;
    try {
      iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    } catch(e) {
      /* Cross-origin block — fall back to DOMParser */
      try {
        var parser = new DOMParser();
        iframeDoc = parser.parseFromString(previewHtml, 'text/html');
      } catch(e2) {
        document.body.removeChild(iframe);
        return null;
      }
    }

    if (!iframeDoc) {
      document.body.removeChild(iframe);
      return null;
    }

    var candidates = [];

    /* --- Scan all img elements --- */
    var imgs = iframeDoc.querySelectorAll('img');
    for (var i = 0; i < imgs.length; i++) {
      var img = imgs[i];
      var src = (
        img.getAttribute('src') ||
        img.getAttribute('data-src') ||
        img.getAttribute('data-imgsrc') ||
        ''
      ).trim();
      src = unwrapSafeImage(src);
      if (isRejectUrl(src)) continue;

      /* Use rendered size from getBoundingClientRect */
      var rect = img.getBoundingClientRect();
      var rw = Math.round(rect.width);
      var rh = Math.round(rect.height);

      /* Also check naturalWidth/Height */
      var nw = img.naturalWidth || 0;
      var nh = img.naturalHeight || 0;

      /* Use the best available dimensions */
      var w = rw > 0 ? rw : nw;
      var h = rh > 0 ? rh : nh;

      /* Reject tiny icons/avatars */
      if ((w > 0 && w < 120) || (h > 0 && h < 120)) continue;

      var score = 0;
      /* Area-based score from rendered size */
      if (w > 0 && h > 0) score += (w * h) / 100;
      /* Natural size bonus */
      if (nw > 0 && nh > 0) score += (nw * nh) / 500;
      /* URL-based boosts */
      var sl = src.toLowerCase();
      if (sl.indexOf('scontent') !== -1) score += 1000;
      if (sl.indexOf('fbcdn') !== -1) score += 700;
      if (sl.indexOf('platform-lookaside') !== -1) score += 600;
      if (sl.indexOf('graph.facebook.com') !== -1) score += 500;
      if (score === 0) score = 100;
      candidates.push({ src: src, score: score });
    }

    /* --- Scan srcset from <source> elements --- */
    var sources = iframeDoc.querySelectorAll('source[srcset]');
    for (var si = 0; si < sources.length; si++) {
      var srcset = sources[si].getAttribute('srcset') || '';
      var firstSrc = srcset.split(',')[0].trim().split(/\s+/)[0];
      firstSrc = unwrapSafeImage(firstSrc);
      if (!isRejectUrl(firstSrc)) {
        var ssl = firstSrc.toLowerCase();
        var sscore = 200;
        if (ssl.indexOf('scontent') !== -1) sscore += 1000;
        if (ssl.indexOf('fbcdn') !== -1) sscore += 700;
        candidates.push({ src: firstSrc, score: sscore });
      }
    }

    /* --- Scan background-image elements --- */
    var allEls = iframeDoc.querySelectorAll('*');
    for (var j = 0; j < allEls.length; j++) {
      var el = allEls[j];
      var style = el.getAttribute('style') || '';
      if (style.toLowerCase().indexOf('background-image') === -1) continue;
      var bgMatch = style.match(/background-image\s*:\s*url\(['"]?([^'")\s]+)/i);
      if (!bgMatch || !bgMatch[1]) continue;
      var bgSrc = unwrapSafeImage(bgMatch[1]);
      if (isRejectUrl(bgSrc)) continue;

      var bgRect = el.getBoundingClientRect();
      var bgW = Math.round(bgRect.width);
      var bgH = Math.round(bgRect.height);
      if ((bgW > 0 && bgW < 120) || (bgH > 0 && bgH < 120)) continue;

      var bgScore = 0;
      if (bgW > 0 && bgH > 0) bgScore += (bgW * bgH) / 100;
      var bsl = bgSrc.toLowerCase();
      if (bsl.indexOf('scontent') !== -1) bgScore += 1000;
      if (bsl.indexOf('fbcdn') !== -1) bgScore += 700;
      if (bsl.indexOf('platform-lookaside') !== -1) bgScore += 600;
      if (bgScore === 0) bgScore = 300;
      candidates.push({ src: bgSrc, score: bgScore });
    }

    /* Clean up iframe */
    document.body.removeChild(iframe);

    if (!candidates.length) return null;
    candidates.sort(function(a, b) { return b.score - a.score; });
    console.log('RENDERED PREVIEW CANDIDATES', candidates.slice(0, 5));
    return candidates[0].src || null;
  } catch (e) {
    console.log('extractPrimaryImageFromRenderedPreview error', e);
    return null;
  }
}

/* ============================================
   3c. EXTRACT IMAGE HASH FROM CREATIVE
   ============================================ */

function extractImageHash(creative) {
  if (!creative) return '';
  if (creative.image_hash) return creative.image_hash;
  var spec = creative.object_story_spec || {};
  if (spec.link_data && spec.link_data.image_hash) return spec.link_data.image_hash;
  if (spec.photo_data && spec.photo_data.image_hash) return spec.photo_data.image_hash;
  if (spec.video_data && spec.video_data.image_hash) return spec.video_data.image_hash;
  if (spec.link_data && spec.link_data.child_attachments) {
    for (var i = 0; i < spec.link_data.child_attachments.length; i++) {
      if (spec.link_data.child_attachments[i].image_hash) {
        return spec.link_data.child_attachments[i].image_hash;
      }
    }
  }
  return '';
}

/* ============================================
   4. FETCH DATA — Main data pipeline
   ============================================ */

function fetchData() {
  if (!TOKEN || !ACCOUNT_ID) return;

  var period = document.getElementById('periodSelect').value;
  var url = META_API + '/act_' + ACCOUNT_ID + '/insights'
    + '?fields=ad_id,ad_name,adset_name,campaign_name,impressions,clicks,spend,reach,frequency,ctr,cpc,actions,action_values'
    + '&level=ad&date_preset=' + period
    + '&limit=200&access_token=' + TOKEN;

  /* Show loading */
  document.getElementById('cardsGrid').innerHTML = '<div class="loading"><span class="spinner"></span> טוען נתונים מ-Meta...</div>';
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('metricsBar').innerHTML = '';
  document.getElementById('analysisSection').classList.add('hidden');

  fetchAllPages(url, [])
    .then(function(allData) {
      if (allData.length === 0) {
        document.getElementById('cardsGrid').innerHTML = '<div class="loading">אין נתונים לתקופה הנבחרת</div>';
        return;
      }
      adsData = allData.map(parseAd);
      return fetchCreativeImages();
    })
    .then(function() {
      /* Step 2b: resolve stable permalink_url via adimages endpoint */
      if (adsData.length > 0) return fetchStableImages();
    })
    .then(function() {
      if (adsData.length > 0) {
        /* Progressive render: show cards immediately with stable/asset fallback */
        resolveCardImages();
        applySort();
        /* Then fetch previews and upgrade card images */
        return fetchPreviewImages();
      }
    })
    .then(function() {
      if (adsData.length > 0) {
        /* Re-resolve with preview images now available, then re-render */
        resolveCardImages();
        renderCards();
        renderTable();
      }
    })
    .catch(function(err) {
      document.getElementById('cardsGrid').innerHTML = '<div class="loading" style="color:var(--red)">שגיאה: ' + esc(err.message || String(err)) + '</div>';
    });
}

/* Fetch all pages of paginated results */
function fetchAllPages(url, accumulated) {
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.error) throw new Error(json.error.message || 'Meta API error');
      var data = json.data || [];
      var all = accumulated.concat(data);
      if (json.paging && json.paging.next) {
        return fetchAllPages(json.paging.next, all);
      }
      return all;
    });
}

/* ============================================
   5. FETCH CREATIVE IMAGES (batch)
   ============================================ */

function fetchCreativeImages() {
  var adIds = adsData.map(function(a) { return a.id; }).filter(Boolean);
  if (adIds.length === 0) return Promise.resolve();

  /* Step 1: get creative IDs for all ads */
  var filterParam = encodeURIComponent('[{"field":"id","operator":"IN","value":' + JSON.stringify(adIds) + '}]');
  var adsUrl = META_API + '/act_' + ACCOUNT_ID + '/ads'
    + '?fields=id,creative{id}&filtering=' + filterParam
    + '&limit=200&access_token=' + TOKEN;

  return fetch(adsUrl)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (!json.data) return;
      /* Map creative IDs back to adsData */
      var creativeMap = {};
      json.data.forEach(function(obj) {
        if (obj.creative && obj.creative.id) {
          creativeMap[obj.id] = obj.creative.id;
        }
      });
      adsData.forEach(function(ad) {
        if (creativeMap[ad.id]) ad.creativeId = creativeMap[ad.id];
      });

      /* Step 2: fetch creative details (thumbnail_url, object_story_spec, image_hash, etc.) */
      var promises = adsData.map(function(ad) {
        if (!ad.creativeId) return Promise.resolve();
        var cUrl = META_API + '/' + ad.creativeId
          + '?fields=thumbnail_url,image_url,object_story_spec,object_type,image_hash'
          + '&thumbnail_width=600&thumbnail_height=600'
          + '&access_token=' + TOKEN;
        return fetch(cUrl)
          .then(function(r) { return r.json(); })
          .then(function(creative) {
            var img = getCreativeImage(creative);
            ad.assetImageUrl = img.src || '';
            ad.creativeType = img.type;
            ad.carouselCount = img.count || 0;
            ad.objectType = creative.object_type || '';
            ad.imageHash = extractImageHash(creative);
          })
          .catch(function() {
            ad.assetImageUrl = '';
            ad.creativeType = 'unknown';
            ad.carouselCount = 0;
          });
      });
      return Promise.all(promises);
    })
    .catch(function() { /* skip image errors silently */ });
}

/* ============================================
   5a2. FETCH STABLE IMAGES via adimages endpoint
   ============================================ */

function fetchStableImages() {
  var hashes = [];
  adsData.forEach(function(ad) {
    if (ad.imageHash && hashes.indexOf(ad.imageHash) === -1) {
      hashes.push(ad.imageHash);
    }
  });

  if (!hashes.length) return Promise.resolve();

  var url = META_API + '/act_' + ACCOUNT_ID + '/adimages'
    + '?fields=hash,permalink_url'
    + '&hashes=' + encodeURIComponent(JSON.stringify(hashes))
    + '&access_token=' + TOKEN;

  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (!json.data) return;
      var map = {};
      json.data.forEach(function(img) {
        if (img.hash && img.permalink_url) {
          map[img.hash] = img.permalink_url;
        }
      });
      adsData.forEach(function(ad) {
        if (ad.imageHash && map[ad.imageHash]) {
          ad.stableAssetImageUrl = map[ad.imageHash];
        }
      });
    })
    .catch(function() { /* skip stable image errors silently */ });
}

/* ============================================
   5b. FETCH PREVIEW IMAGES (batch)
   ============================================ */

function fetchPreviewImages() {
  /* Try multiple preview formats in priority order.
     Stop at the first one that yields a valid main image. */
  var FORMATS = ['DESKTOP_FEED_STANDARD', 'MOBILE_FEED_STANDARD', 'INSTAGRAM_STANDARD'];

  var promises = adsData.map(function(ad) {
    if (!ad.id) return Promise.resolve();
    return tryPreviewFormats(ad, FORMATS, 0);
  });
  return Promise.all(promises);
}

function tryPreviewFormats(ad, formats, index) {
  if (index >= formats.length) return Promise.resolve();
  var fmt = formats[index];
  var url = META_API + '/' + ad.id
    + '/previews?ad_format=' + fmt + '&access_token=' + TOKEN;

  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.data && json.data[0] && json.data[0].body) {
        var body = json.data[0].body;
        /* Always store the first valid preview HTML for modal use */
        if (!ad.previewHtml) {
          ad.previewHtml = body;
          ad.previewFormat = fmt;
        }
        /* Try to extract the main image from the rendered preview */
        return extractPrimaryImageFromRenderedPreview(body)
          .then(function(extracted) {
            if (extracted) {
              ad.previewImageUrl = extracted;
              ad.previewHtml = body;
              ad.previewFormat = fmt;
              return; /* success — stop trying other formats */
            }
            /* Image extraction failed for this format — try next */
            return tryPreviewFormats(ad, formats, index + 1);
          });
      }
      /* No preview data for this format — try next */
      return tryPreviewFormats(ad, formats, index + 1);
    })
    .catch(function() {
      return tryPreviewFormats(ad, formats, index + 1);
    });
}

/* ============================================
   5c. RESOLVE CARD IMAGES — pick best source
   ============================================ */

function resolveCardImages() {
  adsData.forEach(function(ad) {
    if (ad.previewImageUrl) {
      ad.finalCardImageUrl = ad.previewImageUrl;
      ad.finalImageSource = 'preview';
    } else if (ad.stableAssetImageUrl) {
      ad.finalCardImageUrl = ad.stableAssetImageUrl;
      ad.finalImageSource = 'stable';
    } else if (ad.assetImageUrl) {
      ad.finalCardImageUrl = ad.assetImageUrl;
      ad.finalImageSource = 'asset';
    } else {
      ad.finalCardImageUrl = '';
      ad.finalImageSource = 'none';
    }
  });
}

/* ============================================
   6. PARSE AD DATA
   ============================================ */

function parseAd(raw) {
  var spend = parseFloat(raw.spend) || 0;
  var purchases = 0;
  var revenue = 0;

  if (raw.actions) {
    raw.actions.forEach(function(a) {
      if (a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase') {
        purchases += parseInt(a.value) || 0;
      }
    });
  }
  if (raw.action_values) {
    raw.action_values.forEach(function(a) {
      if (a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase') {
        revenue += parseFloat(a.value) || 0;
      }
    });
  }

  var roas = spend > 0 ? revenue / spend : 0;
  var status = 'new';
  if (spend >= 50) {
    if (roas >= 3) status = 'win';
    else if (roas >= 1.5) status = 'ok';
    else status = 'stop';
  }

  return {
    id: raw.ad_id,
    name: raw.ad_name || 'ללא שם',
    adset: raw.adset_name || '',
    campaign: raw.campaign_name || '',
    spend: spend,
    impressions: parseInt(raw.impressions) || 0,
    clicks: parseInt(raw.clicks) || 0,
    reach: parseInt(raw.reach) || 0,
    frequency: parseFloat(raw.frequency) || 0,
    ctr: parseFloat(raw.ctr) || 0,
    cpc: parseFloat(raw.cpc) || 0,
    purchases: purchases,
    revenue: revenue,
    roas: roas,
    status: status,
    creativeId: '',
    creativeType: 'unknown',
    carouselCount: 0,
    objectType: '',
    imageHash: '',
    /* --- Explicit image fields --- */
    assetImageUrl: '',        /* from creative thumbnail_url / image_url / carousel */
    stableAssetImageUrl: '',  /* from adimages permalink_url (never expires) */
    previewHtml: '',          /* raw Meta ad preview HTML for modal iframe */
    previewFormat: '',        /* which format worked (DESKTOP/MOBILE/INSTAGRAM) */
    previewImageUrl: '',      /* extracted main image from rendered preview */
    finalCardImageUrl: '',    /* resolved best image for card display */
    finalImageSource: 'none'  /* preview / stable / asset / none */
  };
}

/* ============================================
   7. SORT
   ============================================ */

function applySort() {
  var val = document.getElementById('sortSelect').value;
  var parts = val.split('_');
  var field = parts[0];
  var dir = parts[parts.length - 1]; /* 'asc' or 'desc' */

  adsData.sort(function(a, b) {
    var va = a[field] || 0;
    var vb = b[field] || 0;
    return dir === 'desc' ? (vb - va) : (va - vb);
  });

  renderMetrics();
  renderCards();
  renderTable();
}

/* ============================================
   8. RENDER METRICS
   ============================================ */

function renderMetrics() {
  var totalSpend = 0, totalRevenue = 0, totalPurchases = 0;
  adsData.forEach(function(ad) {
    totalSpend += ad.spend;
    totalRevenue += ad.revenue;
    totalPurchases += ad.purchases;
  });
  var totalRoas = totalSpend > 0 ? (totalRevenue / totalSpend).toFixed(2) : '0';
  document.getElementById('metricsBar').innerHTML =
    metricBox('הוצאה כוללת', formatNIS(totalSpend))
    + metricBox('הכנסה כוללת', formatNIS(totalRevenue))
    + metricBox('ROAS כולל', totalRoas + 'x')
    + metricBox('רכישות', totalPurchases.toLocaleString())
    + metricBox('קריאייטיבים', adsData.length.toString());
}

function metricBox(label, value) {
  return '<div class="metric-card"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}

/* ============================================
   9. RENDER CARDS
   ============================================ */

function renderCards() {
  if (adsData.length === 0) {
    document.getElementById('cardsGrid').innerHTML = '<div class="loading">אין נתונים</div>';
    return;
  }
  var html = '';
  adsData.forEach(function(ad, i) {
    var sb = statusBadge(ad.status);
    var thumbHtml = ad.finalCardImageUrl
      ? '<img src="' + escAttr(ad.finalCardImageUrl) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'🖼️\'">'
      : '🖼️';
    var carouselBadge = '';
    if (ad.creativeType === 'carousel' && ad.carouselCount > 0) {
      carouselBadge = '<div class="badge-carousel">🎠 x' + ad.carouselCount + '</div>';
    }
    var sourceBadge = '';
    if (ad.finalImageSource === 'preview') {
      sourceBadge = '<div class="badge-source badge-source-preview">PREVIEW</div>';
    } else if (ad.finalImageSource === 'stable') {
      sourceBadge = '<div class="badge-source badge-source-preview">STABLE</div>';
    } else if (ad.finalImageSource === 'asset') {
      sourceBadge = '<div class="badge-source badge-source-asset">ASSET</div>';
    }
    html += '<div class="ad-card" onclick="openModal(' + i + ')">'
      + '<div class="thumb">' + thumbHtml + '</div>'
      + '<div class="badge-status ' + sb.cls + '">' + sb.label + '</div>'
      + '<div class="badge-roas">ROAS ' + ad.roas.toFixed(2) + '</div>'
      + carouselBadge
      + sourceBadge
      + '<div class="info">'
      + '<div class="name" title="' + escAttr(ad.name) + '">' + esc(ad.name) + '</div>'
      + '<div class="adset" title="' + escAttr(ad.adset) + '">' + esc(ad.adset) + '</div>'
      + '<div class="stats">'
      + statCell('הוצאה', formatNIS(ad.spend))
      + statCell('CTR', ad.ctr.toFixed(2) + '%')
      + statCell('המרות', String(ad.purchases))
      + statCell('Freq', ad.frequency.toFixed(2))
      + '</div></div></div>';
  });
  document.getElementById('cardsGrid').innerHTML = html;
}

function statCell(label, value) {
  return '<div class="stat"><span>' + label + ': </span>' + value + '</div>';
}

/* ============================================
   10. RENDER TABLE
   ============================================ */

function renderTable() {
  var html = '<table><thead><tr>'
    + '<th></th><th>קריאייטיב</th><th>סוג</th><th>אדסט</th>'
    + '<th>הוצאה</th><th>הכנסה</th><th>ROAS</th><th>CTR</th><th>CPC</th>'
    + '<th>Freq</th><th>המרות</th><th>סטטוס</th>'
    + '</tr></thead><tbody>';

  adsData.forEach(function(ad, i) {
    var sb = statusBadge(ad.status);
    var thumbHtml = ad.finalCardImageUrl
      ? '<img src="' + escAttr(ad.finalCardImageUrl) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'🖼️\'">'
      : '🖼️';
    var miniCarousel = '';
    if (ad.creativeType === 'carousel' && ad.carouselCount > 0) {
      miniCarousel = '<span class="carousel-mini">🎠' + ad.carouselCount + '</span>';
    }
    var miniSource = '';
    if (ad.finalImageSource === 'preview') {
      miniSource = '<span class="source-mini source-mini-preview">PV</span>';
    } else if (ad.finalImageSource === 'stable') {
      miniSource = '<span class="source-mini source-mini-preview">ST</span>';
    } else if (ad.finalImageSource === 'asset') {
      miniSource = '<span class="source-mini source-mini-asset">AS</span>';
    }
    var typeLabel = ad.creativeType === 'carousel'
      ? '🎠 קרוסלה'
      : (ad.creativeType === 'single' ? '🖼 תמונה' : '-');

    html += '<tr onclick="openModal(' + i + ')" style="cursor:pointer">'
      + '<td><div class="thumb-cell">' + thumbHtml + miniCarousel + miniSource + '</div></td>'
      + '<td title="' + escAttr(ad.name) + '">' + esc(truncate(ad.name, 40)) + '</td>'
      + '<td>' + typeLabel + '</td>'
      + '<td>' + esc(truncate(ad.adset, 30)) + '</td>'
      + '<td>' + formatNIS(ad.spend) + '</td>'
      + '<td>' + formatNIS(ad.revenue) + '</td>'
      + '<td>' + ad.roas.toFixed(2) + '</td>'
      + '<td>' + ad.ctr.toFixed(2) + '%</td>'
      + '<td>' + formatNIS(ad.cpc) + '</td>'
      + '<td>' + ad.frequency.toFixed(2) + '</td>'
      + '<td>' + ad.purchases + '</td>'
      + '<td><span class="badge-status ' + sb.cls + '" style="position:static">' + sb.label + '</span></td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

/* ============================================
   11. VIEW TOGGLE
   ============================================ */

function setView(view) {
  currentView = view;
  document.getElementById('btnCards').classList.toggle('active', view === 'cards');
  document.getElementById('btnTable').classList.toggle('active', view === 'table');
  document.getElementById('cardsGrid').classList.toggle('hidden', view !== 'cards');
  document.getElementById('tableWrap').classList.toggle('hidden', view !== 'table');
}

/* ============================================
   12. MODAL WITH AD PREVIEW
   ============================================ */

function openModal(index) {
  var ad = adsData[index];
  if (!ad) return;

  var imgHtml = ad.finalCardImageUrl
    ? '<img class="modal-img" src="' + escAttr(ad.finalCardImageUrl) + '" alt="" onerror="this.style.display=\'none\'">'
    : '';

  var typeTag = '';
  if (ad.creativeType === 'carousel') {
    typeTag = ' <span style="font-size:12px;color:var(--purple)">(🎠 קרוסלה — ' + ad.carouselCount + ' כרטיסים)</span>';
  }

  var html = imgHtml
    + '<div class="modal-title">' + esc(ad.name) + typeTag + '</div>'
    + '<div class="modal-sub">' + esc(ad.campaign) + ' &bull; ' + esc(ad.adset) + '</div>'
    + '<div class="modal-stats">'
    + msStat('הוצאה', formatNIS(ad.spend))
    + msStat('הכנסה', formatNIS(ad.revenue))
    + msStat('ROAS', ad.roas.toFixed(2) + 'x')
    + msStat('רכישות', String(ad.purchases))
    + msStat('חשיפות', ad.impressions.toLocaleString())
    + msStat('קליקים', ad.clicks.toLocaleString())
    + msStat('CTR', ad.ctr.toFixed(2) + '%')
    + msStat('CPC', formatNIS(ad.cpc))
    + msStat('Reach', ad.reach.toLocaleString())
    + msStat('Frequency', ad.frequency.toFixed(2))
    + '</div>'
    + '<div class="preview-label">תצוגה מקדימה של המודעה:</div>'
    + '<div class="ad-preview-wrap" id="adPreviewWrap">'
    + '<div class="pv-msg"><span class="spinner"></span>&nbsp; טוען תצוגה מקדימה...</div>'
    + '</div>';

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
  loadAdPreview(ad);
}

function loadAdPreview(ad) {
  var format = ad.previewFormat || 'DESKTOP_FEED_STANDARD';
  var url = META_API + '/' + ad.id
    + '/previews?ad_format=' + format + '&access_token=' + TOKEN;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      var wrap = document.getElementById('adPreviewWrap');
      if (!wrap) return;
      if (json.error || !json.data || !json.data[0] || !json.data[0].body) {
        wrap.innerHTML = '<div class="pv-msg" style="font-size:12px">לא ניתן לטעון תצוגה מקדימה</div>';
        return;
      }
      var body = json.data[0].body;
      wrap.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(body) + '"></iframe>';
    })
    .catch(function() {
      var wrap = document.getElementById('adPreviewWrap');
      if (wrap) wrap.innerHTML = '<div class="pv-msg" style="font-size:12px">שגיאה בטעינת תצוגה מקדימה</div>';
    });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function msStat(label, value) {
  return '<div class="ms"><div class="ms-label">' + label + '</div><div class="ms-value">' + value + '</div></div>';
}

/* ============================================
   13. CLAUDE AI ANALYSIS
   ============================================ */

function runAnalysis() {
  if (!CLAUDE_KEY && !WORKER_URL) {
    alert('יש להזין Claude API Key ו-Cloudflare Worker URL בעת ההתחברות');
    return;
  }
  if (adsData.length === 0) {
    alert('אין נתונים לנתח. טעני נתונים קודם.');
    return;
  }

  var btn = document.getElementById('analysisBtn');
  btn.disabled = true;
  btn.textContent = '⏳ מנתח נתונים...';

  var summary = adsData.map(function(ad) {
    return {
      name: ad.name,
      adset: ad.adset,
      campaign: ad.campaign,
      spend: ad.spend.toFixed(2),
      revenue: ad.revenue.toFixed(2),
      roas: ad.roas.toFixed(2),
      purchases: ad.purchases,
      ctr: ad.ctr.toFixed(2),
      cpc: ad.cpc.toFixed(2),
      frequency: ad.frequency.toFixed(2),
      impressions: ad.impressions,
      status: ad.status,
      type: ad.creativeType
    };
  });

  var prompt = 'אתה מומחה פרסום דיגיטלי. נתח את הקריאייטיבים הבאים מ-Meta Ads וספק ניתוח מקיף בעברית:\n\n'
    + '🏆 הקריאייטיבים המנצחים\n'
    + '💀 קריאייטיבים שצריך לעצור\n'
    + '📊 תובנות על קהלים (לפי אדסטים)\n'
    + '🎯 5 פעולות מיידיות\n'
    + '💡 רעיונות לקריאייטיבים חדשים\n'
    + '⚠️ אזהרות וסיכונים\n\n'
    + 'הנתונים:\n' + JSON.stringify(summary, null, 2);

  var endpoint = WORKER_URL || '';
  if (!endpoint) {
    btn.disabled = false;
    btn.textContent = '🤖 ניתוח Claude AI';
    alert('חסר Worker URL');
    return;
  }

  fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      apiKey: CLAUDE_KEY,
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    btn.disabled = false;
    btn.textContent = '🤖 ניתוח Claude AI';
    if (json.error) {
      alert('שגיאת Claude: ' + (json.error.message || JSON.stringify(json.error)));
      return;
    }
    var text = '';
    if (json.content && json.content[0] && json.content[0].text) {
      text = json.content[0].text;
    } else {
      text = 'לא התקבלה תשובה מ-Claude';
    }
    document.getElementById('analysisContent').textContent = text;
    document.getElementById('analysisSection').classList.remove('hidden');
    document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth' });
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = '🤖 ניתוח Claude AI';
    alert('שגיאת רשת: ' + err.message);
  });
}

/* ============================================
   14. HELPER FUNCTIONS
   ============================================ */

function statusBadge(status) {
  switch (status) {
    case 'win':  return { cls: 'badge-win',  label: 'WIN 🟢' };
    case 'ok':   return { cls: 'badge-ok',   label: 'OK 🟡' };
    case 'stop': return { cls: 'badge-stop', label: 'STOP 🔴' };
    default:     return { cls: 'badge-new',  label: 'חדש ⚪' };
  }
}

function formatNIS(n) {
  return '₪' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.substring(0, max) + '...' : s;
}

/* ============================================
   15. KEYBOARD SHORTCUTS
   ============================================ */

document.addEventListener('keydown', function(e) {
  /* ESC closes modal */
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('show');
  }
});

/* ============================================
   INIT — run on page load
   ============================================ */

syncPeriods();
restoreSession();

</script>
