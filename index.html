<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --surface:#1a1a2e;
  --border:#1e1e2e;
  --accent:#00ff9d;
  --text:#e0e0e0;
  --dim:#888;
  --red:#ff4d6a;
  --yellow:#ffd700;
  --green:#00ff9d;
  --purple:#a78bfa;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.hidden{display:none!important}

/* ===== Login ===== */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:92%;max-width:400px;text-align:center}
.login-box h1{color:var(--accent);margin-bottom:8px;font-size:24px}
.login-box .sub{color:var(--dim);margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;direction:ltr;text-align:left}
.login-box input::placeholder{color:#555}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-box button:hover{opacity:.85}
.login-box .login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}
.logout-btn{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,77,106,.3);background:transparent;color:var(--red);font-size:12px;cursor:pointer;transition:opacity .2s}
.logout-btn:hover{opacity:.7}

/* ===== Top Bar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;color:var(--accent)}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.topbar-actions select,.topbar-actions button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer}
.topbar-actions button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.topbar-actions button:hover{opacity:.85}

/* ===== Metrics ===== */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 24px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.metric-card .label{font-size:12px;color:var(--dim);margin-bottom:4px}
.metric-card .value{font-size:22px;font-weight:700;color:var(--accent)}

/* ===== View Toggle ===== */
.view-toggle{display:flex;gap:8px;padding:0 24px 12px;justify-content:flex-start}
.view-toggle button{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:13px;transition:.15s}
.view-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* ===== Cards Grid ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 24px 24px}
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.ad-card:hover{transform:translateY(-3px);border-color:var(--accent)}
.ad-card .thumb{width:100%;height:180px;object-fit:cover;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--dim);overflow:hidden}
.ad-card .thumb img{width:100%;height:100%;object-fit:cover}
.ad-card .thumb iframe{width:100%;height:100%;border:none;pointer-events:none}
.ad-card .badge-status{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.ad-card .badge-roas{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(0,0,0,.65);color:#fff;backdrop-filter:blur(8px)}
.ad-card .badge-carousel{position:absolute;top:42px;left:10px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;background:rgba(120,80,255,.75);color:#fff;backdrop-filter:blur(8px)}
.ad-card .badge-media{position:absolute;bottom:186px;left:10px;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.5px;backdrop-filter:blur(8px);background:rgba(255,255,255,.15);color:#ccc}
.badge-win{background:rgba(0,255,157,.2);color:var(--green)}
.badge-ok{background:rgba(255,215,0,.2);color:var(--yellow)}
.badge-stop{background:rgba(255,77,106,.2);color:var(--red)}
.badge-new{background:rgba(255,255,255,.15);color:#ccc}
.ad-card .info{padding:14px}
.ad-card .info .name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .headline{font-size:12px;color:var(--dim);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .adset{font-size:11px;color:var(--dim);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ad-card .info .stats .stat{font-size:12px}
.ad-card .info .stats .stat span{color:var(--dim)}
.preview-toggle{position:absolute;bottom:190px;right:10px;padding:2px 8px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:8px;cursor:pointer;z-index:10;transition:opacity .2s}
.preview-toggle:hover{opacity:.85}

/* ===== Expanded Cards Grid ===== */
.grid-expanded{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px;padding:0 24px 24px}
.expanded-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.expanded-card:hover{transform:translateY(-3px);border-color:var(--accent)}
.expanded-card .thumb{width:100%;height:500px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--dim);overflow:hidden}
.expanded-card .thumb img{width:100%;height:100%;object-fit:cover}
.expanded-card .thumb iframe{width:100%;height:100%;border:none;pointer-events:none}
.expanded-card .badge-status{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.expanded-card .badge-roas{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(0,0,0,.65);color:#fff;backdrop-filter:blur(8px)}
.expanded-card .badge-carousel{position:absolute;top:42px;left:10px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;background:rgba(120,80,255,.75);color:#fff;backdrop-filter:blur(8px)}
.expanded-card .badge-media{position:absolute;bottom:326px;left:10px;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.5px;backdrop-filter:blur(8px);background:rgba(255,255,255,.15);color:#ccc}
.expanded-card .preview-toggle{bottom:330px;right:10px}
.expanded-card .info{padding:16px}
.expanded-card .info .name{font-size:16px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expanded-card .info .headline{font-size:13px;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expanded-card .info .body-text{font-size:12px;color:var(--dim);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.expanded-card .info .adset{font-size:11px;color:var(--dim);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expanded-card .info .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.expanded-card .info .stats .stat{font-size:12px}
.expanded-card .info .stats .stat span{color:var(--dim)}
.expanded-card .info .opener{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expanded-card .info .stats .stat.roas-emphasis{color:var(--accent);font-weight:800}

/* ===== Ad Action Recommendation ===== */
.ad-action{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;margin-top:8px;font-size:12px;font-weight:700;cursor:default}
.ad-action .action-icon{font-size:16px}
.ad-action .action-text{flex:1}
.ad-action.action-stop{background:rgba(255,77,106,.12);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.ad-action.action-scale{background:rgba(0,255,157,.12);color:var(--green);border:1px solid rgba(0,255,157,.25)}
.ad-action.action-grow{background:rgba(0,255,157,.08);color:var(--green);border:1px solid rgba(0,255,157,.15)}
.ad-action.action-refresh{background:rgba(255,215,0,.1);color:var(--yellow);border:1px solid rgba(255,215,0,.2)}
.ad-action.action-check{background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.ad-action.action-reduce{background:rgba(255,140,0,.1);color:#ff8c00;border:1px solid rgba(255,140,0,.2)}
.ad-action.action-wait{background:rgba(136,136,136,.1);color:var(--dim);border:1px solid rgba(136,136,136,.2)}
.ad-action.action-watch{background:rgba(136,136,136,.08);color:var(--dim);border:1px solid rgba(136,136,136,.15)}

/* ===== Ad Flags (Claude Insights) ===== */
.ad-flags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ad-flag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.ad-flag.flag-red{background:rgba(255,77,106,.15);color:var(--red)}
.ad-flag.flag-yellow{background:rgba(255,215,0,.15);color:var(--yellow)}
.ad-flag.flag-orange{background:rgba(255,140,0,.15);color:#ff8c00}

/* ===== Compact Cards Grid ===== */
.grid-compact{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:0 24px 24px}
.compact-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.compact-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.compact-card .compact-thumb{width:100%;height:130px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--dim);overflow:hidden}
.compact-card .compact-thumb img{width:100%;height:100%;object-fit:cover}
.compact-card .compact-badge-roas{position:absolute;top:6px;left:6px;padding:3px 7px;border-radius:12px;font-size:10px;font-weight:700;background:rgba(0,0,0,.65);color:#fff;backdrop-filter:blur(8px)}
.compact-card .compact-badge-status{position:absolute;top:6px;right:6px;padding:3px 7px;border-radius:12px;font-size:9px;font-weight:700;backdrop-filter:blur(8px)}
.compact-card .compact-info{padding:8px 10px}
.compact-card .compact-info .compact-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.compact-card .compact-info .compact-stats{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.compact-card .compact-info .compact-stats .cstat{font-size:10px;color:var(--dim)}
.compact-card .compact-info .compact-stats .cstat b{color:var(--text);font-weight:600}

/* ===== Table ===== */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:var(--card);padding:10px 12px;text-align:right;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
.table-wrap td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.table-wrap tr:hover{background:rgba(0,255,157,.03)}
.table-wrap .thumb-cell{width:50px;height:50px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surface);font-size:20px;position:relative}
.table-wrap .thumb-cell img{width:100%;height:100%;object-fit:cover}

/* ===== Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:900;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal .close-btn{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--dim);font-size:28px;cursor:pointer;z-index:10;line-height:1}
.modal .close-btn:hover{color:var(--text)}
.modal .modal-title{font-size:18px;font-weight:700;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--dim);margin-bottom:16px}
.modal .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.modal .modal-stats .ms{background:var(--surface);padding:12px;border-radius:8px}
.modal .modal-stats .ms .ms-label{font-size:11px;color:var(--dim)}
.modal .modal-stats .ms .ms-value{font-size:18px;font-weight:700}
.preview-label{font-size:12px;color:var(--dim);margin-bottom:6px;margin-top:8px}
.ad-preview-wrap{border-radius:8px;overflow:hidden;background:#fff;min-height:80px;position:relative}
.ad-preview-wrap iframe{width:100%;min-height:420px;border:none}
.ad-preview-wrap .pv-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);background:var(--surface);font-size:13px}

/* ===== Analysis ===== */
.analysis-btn{display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.analysis-btn:hover{opacity:.85}
.analysis-btn:disabled{opacity:.5;cursor:not-allowed}
.analysis-section{padding:0 24px 24px}
.analysis-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.analysis-box h3{color:var(--accent);margin-bottom:12px}
.analysis-box .analysis-content{white-space:pre-wrap;line-height:1.8;font-size:14px}
.an-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.an-summary{border-color:rgba(0,255,157,.3)}
.an-label{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px}
.an-body{font-size:14px;line-height:1.7;color:var(--text)}
.an-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.an-tag{flex-shrink:0;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-top:2px}
.an-text{font-size:13px;line-height:1.6;color:var(--text)}
.an-green{background:rgba(0,255,157,.15);color:var(--green)}
.an-red{background:rgba(255,77,106,.15);color:var(--red)}
.an-yellow{background:rgba(255,215,0,.15);color:var(--yellow)}
.an-purple{background:rgba(167,139,250,.15);color:var(--purple)}
.an-list{margin-right:18px;font-size:13px;line-height:1.8;color:var(--text)}

/* ===== Loading ===== */
.loading{text-align:center;padding:60px;color:var(--dim);font-size:16px}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Bottom Bar ===== */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;flex-wrap:wrap}
.bottombar select,.bottombar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer}
.bottombar button.danger{color:var(--red);border-color:rgba(255,77,106,.3)}
.bottombar button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.main-content{padding-bottom:65px}

/* ===== Sort ===== */
.sort-bar{padding:0 24px 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sort-bar label{font-size:12px;color:var(--dim)}
.sort-bar select{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer}

/* ===== Filter Bar ===== */
.filter-bar{display:flex;gap:6px;padding:0 24px 12px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.filter-pill:hover{border-color:var(--accent);color:var(--text)}
.filter-pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.filter-pill.pill-stop.active{background:var(--red);border-color:var(--red)}
.filter-pill.pill-scale.active{background:var(--green);border-color:var(--green)}
.filter-pill.pill-grow.active{background:var(--green);border-color:var(--green);opacity:.8}
.filter-pill.pill-refresh.active{background:var(--yellow);color:#000;border-color:var(--yellow)}
.filter-pill.pill-check.active{background:var(--purple);border-color:var(--purple)}
.filter-pill.pill-reduce.active{background:#ff8c00;border-color:#ff8c00}
.filter-pill.pill-wait.active{background:#666;border-color:#666;color:#fff}
.filter-pill.pill-watch.active{background:#888;border-color:#888;color:#fff}
.filter-pill.pill-flagged.active{background:#ff6b6b;border-color:#ff6b6b}
.filter-count{font-size:10px;margin-right:2px;opacity:.8}

/* ===== Responsive ===== */
@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .grid-expanded{grid-template-columns:1fr}
  .grid-compact{grid-template-columns:1fr 1fr}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:16px}
  .modal{padding:16px}
  .modal .modal-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>Meta Ads Dashboard</h1>
    <div class="sub">התחברו כדי לצפות בנתונים</div>
    <input type="email" id="inputEmail" placeholder="אימייל" autocomplete="email">
    <input type="password" id="inputPassword" placeholder="סיסמה" autocomplete="current-password">
    <button onclick="doLogin()">התחבר</button>
    <div class="login-error" id="loginError">אימייל או סיסמה שגויים</div>
  </div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="topbar hidden" id="topbar">
  <h1>Meta Ads Dashboard</h1>
  <div class="topbar-actions">
    <select id="periodSelect">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">טען נתונים</button>
    <button class="logout-btn" onclick="doLogout()">התנתק</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main-content hidden" id="mainContent">
  <div class="metrics" id="metricsBar"></div>
  <div style="padding:0 24px 12px"><button class="analysis-btn" id="analysisBtn" onclick="runAnalysis()">🤖 ניתוח Claude AI</button></div>
  <div class="view-toggle">
    <button class="active" id="btnCards" onclick="setView('cards')">כרטיסים</button>
    <button id="btnExpanded" onclick="setView('expanded')">מורחב</button>
    <button id="btnCompact" onclick="setView('compact')">מוקטן</button>
    <button id="btnTable" onclick="setView('table')">טבלה</button>
  </div>
  <div class="sort-bar">
    <label>מיון:</label>
    <select id="sortSelect" onchange="applySort()">
      <option value="spend_desc">הוצאה (גבוה→נמוך)</option>
      <option value="spend_asc">הוצאה (נמוך→גבוה)</option>
      <option value="roas_desc">ROAS (גבוה→נמוך)</option>
      <option value="roas_asc">ROAS (נמוך→גבוה)</option>
      <option value="purchases_desc">המרות (גבוה→נמוך)</option>
      <option value="ctr_desc">CTR (גבוה→נמוך)</option>
    </select>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">הכל</button>
    <button class="filter-pill pill-stop" data-filter="action-stop" onclick="setFilter('action-stop')">💀 לעצור מיד</button>
    <button class="filter-pill pill-scale" data-filter="action-scale" onclick="setFilter('action-scale')">🏆 להגדיל (מנצח)</button>
    <button class="filter-pill pill-grow" data-filter="action-grow" onclick="setFilter('action-grow')">📈 להגדיל תקציב</button>
    <button class="filter-pill pill-refresh" data-filter="action-refresh" onclick="setFilter('action-refresh')">⚠️ להחליף קריאייטיב</button>
    <button class="filter-pill pill-check" data-filter="action-check" onclick="setFilter('action-check')">🔍 לבדוק דף נחיתה</button>
    <button class="filter-pill pill-reduce" data-filter="action-reduce" onclick="setFilter('action-reduce')">⏸️ להקטין תקציב</button>
    <button class="filter-pill pill-wait" data-filter="action-wait" onclick="setFilter('action-wait')">⏳ לחכות לנתונים</button>
    <button class="filter-pill pill-watch" data-filter="action-watch" onclick="setFilter('action-watch')">👀 לעקוב</button>
    <button class="filter-pill pill-flagged" data-filter="has-flags" onclick="setFilter('has-flags')">🚩 יש דגלים</button>
  </div>
  <div class="grid" id="cardsGrid"></div>
  <div class="grid-expanded hidden" id="expandedGrid"></div>
  <div class="grid-compact hidden" id="compactGrid"></div>
  <div class="table-wrap hidden" id="tableWrap"></div>
  <div class="analysis-section hidden" id="analysisSection">
    <div class="analysis-box">
      <h3>🤖 ניתוח Claude AI</h3>
      <div class="analysis-content" id="analysisContent"></div>
    </div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('show')">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ===== BOTTOM BAR ===== -->
<div class="bottombar hidden" id="bottomBar">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select id="periodSelectBottom">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">🔄 רענן</button>
  </div>
</div>

<script>
/* ===========================================
   META ADS DASHBOARD — WORKER-BACKED VERSION
   All API calls go through Cloudflare Worker.
   No tokens stored in the browser.
   =========================================== */

/* ---------- Global State ---------- */
var WORKER_URL = 'https://meta-ads-worker.dana-a77.workers.dev';
var adsData = [];
var currentView = 'cards';
var activeFilter = 'all';

/* ============================================
   1. AUTH — hardcoded users, 7-day localStorage session
   ============================================ */

var USERS = [
  { emailHash: 'b5e76b4815987b7315d979d8127c2908cc14361687306943d34fc7c3dd367815', passHash: '19b4baa06c2f5e4828a813c67f3cb51b0b72d2dc370af59fb2e8bf566695de83' },
  { emailHash: '32c28883978686f99da9a32be1ffc9eb138c0cb889ac930e2e370d1f9358c817', passHash: '23182ab802e7bd2cdd773702e141c72658ecdae50f6d5412aa6717803c2b5b17' }
];
var SESSION_KEY = 'meta_dash_session';
var SESSION_DAYS = 7;

async function sha256(str) {
  var buf = new TextEncoder().encode(str);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

async function doLogin() {
  var email = document.getElementById('inputEmail').value.trim().toLowerCase();
  var pass = document.getElementById('inputPassword').value;
  var errEl = document.getElementById('loginError');

  var eHash = await sha256(email);
  var pHash = await sha256(pass);
  var match = USERS.find(function(u) {
    return u.emailHash === eHash && u.passHash === pHash;
  });

  if (!match) {
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  var session = { user: eHash, expires: Date.now() + SESSION_DAYS * 86400000 };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  showApp();
  fetchData();
}

function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  adsData = [];
  document.getElementById('loginOverlay').style.display = '';
  document.getElementById('topbar').classList.add('hidden');
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('bottomBar').classList.add('hidden');
  document.getElementById('analysisSection').classList.add('hidden');
  document.getElementById('inputEmail').value = '';
  document.getElementById('inputPassword').value = '';
}

function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('topbar').classList.remove('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('bottomBar').classList.remove('hidden');
}

function checkSession() {
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    var session = JSON.parse(raw);
    if (session.expires > Date.now()) return true;
    localStorage.removeItem(SESSION_KEY);
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
  return false;
}

/* ============================================
   2. SYNC PERIOD SELECTORS
   ============================================ */

function syncPeriods() {
  var top = document.getElementById('periodSelect');
  var bot = document.getElementById('periodSelectBottom');
  top.addEventListener('change', function() { bot.value = top.value; });
  bot.addEventListener('change', function() { top.value = bot.value; });
}

/* ============================================
   3. ENRICH AD DATA FROM WORKER RESPONSE
   Worker returns parsed ads with creative info.
   We add UI-only fields here.
   ============================================ */

function enrichAd(ad) {
  ad.previewBody = '';
  ad.previewLoaded = false;
  ad.previewState = 'asset';

  if (!ad.creativeType) ad.creativeType = 'unknown';
  if (ad.creativeType === 'carousel') ad.mediaLabel = 'Carousel';
  else if (ad.creativeType === 'video') ad.mediaLabel = 'Video';
  else if (ad.creativeType === 'image') ad.mediaLabel = 'Image';
  else ad.mediaLabel = 'Creative';

  if (!ad.carouselCount) ad.carouselCount = 0;
  if (!ad.thumbnail) ad.thumbnail = '';
  if (!ad.headline) ad.headline = '';
  if (!ad.bodyText) ad.bodyText = '';

  return ad;
}

/* ============================================
   3b. AD FLAGS (Claude Insights)
   ============================================ */

function computeAdFlags() {
  if (adsData.length === 0) return;

  /* Compute account averages for relative thresholds */
  var totalCpc = 0, totalCtr = 0, totalRoas = 0, count = 0;
  adsData.forEach(function(ad) {
    if (ad.spend > 10) {
      totalCpc += ad.cpc;
      totalCtr += ad.ctr;
      totalRoas += ad.roas;
      count++;
    }
  });
  var avgCpc = count > 0 ? totalCpc / count : 5;
  var avgCtr = count > 0 ? totalCtr / count : 1.5;
  var avgRoas = count > 0 ? totalRoas / count : 2;

  adsData.forEach(function(ad) {
    var flags = [];

    /* High Frequency — frequency >= 3 */
    if (ad.frequency >= 3) {
      flags.push({ label: '⚡ High Frequency', cls: 'flag-orange' });
    }

    /* CTR Drop — CTR below 50% of account average (with meaningful spend) */
    if (ad.spend > 20 && ad.ctr < avgCtr * 0.5) {
      flags.push({ label: '📉 CTR Drop', cls: 'flag-yellow' });
    }

    /* CPC Rising — CPC above 150% of account average */
    if (ad.spend > 20 && ad.cpc > avgCpc * 1.5) {
      flags.push({ label: '💸 CPC Rising', cls: 'flag-yellow' });
    }

    /* ROAS Decay — ROAS dropping below 1.5 with real spend */
    if (ad.spend >= 50 && ad.roas > 0 && ad.roas < 1.5) {
      flags.push({ label: '📊 ROAS Decay', cls: 'flag-orange' });
    }

    /* Spend With No Efficiency — high spend, ROAS below 1 */
    if (ad.spend >= 80 && ad.roas < 1) {
      flags.push({ label: '🔥 Spend No ROI', cls: 'flag-red' });
    }

    /* Likely Fatigued — high frequency + below-average CTR */
    if (ad.frequency >= 2.5 && ad.ctr < avgCtr * 0.7 && ad.spend > 30) {
      flags.push({ label: '😴 Likely Fatigued', cls: 'flag-red' });
    }

    ad.flags = flags;

    /* === Action recommendation (one primary action per ad) === */
    if (ad.spend >= 80 && ad.roas < 1) {
      ad.action = { icon: '💀', text: 'לעצור מיד', detail: 'הוצאה של ' + formatNIS(ad.spend) + ' עם ROAS ' + ad.roas.toFixed(2) + ' — הפסד', cls: 'action-stop' };
    } else if (ad.spend >= 50 && ad.roas === 0 && ad.purchases === 0) {
      ad.action = { icon: '💀', text: 'לעצור מיד', detail: 'אין מכירות כלל עם הוצאה של ' + formatNIS(ad.spend), cls: 'action-stop' };
    } else if (ad.roas >= 5 && ad.purchases >= 3) {
      ad.action = { icon: '🏆', text: 'להגדיל תקציב', detail: 'ROAS מטורף של ' + ad.roas.toFixed(2) + ' עם ' + ad.purchases + ' רכישות', cls: 'action-scale' };
    } else if (ad.roas >= 3 && ad.purchases >= 2) {
      ad.action = { icon: '📈', text: 'להגדיל תקציב', detail: 'ROAS של ' + ad.roas.toFixed(2) + ' עם ' + ad.purchases + ' רכישות — פוטנציאל', cls: 'action-grow' };
    } else if (ad.frequency >= 3 && ad.roas >= 2) {
      ad.action = { icon: '⚠️', text: 'להכין קריאייטיב חדש', detail: 'תדירות ' + ad.frequency.toFixed(1) + ' עם ROAS טוב — להחליף לפני ירידה', cls: 'action-refresh' };
    } else if (ad.ctr > avgCtr * 1.5 && ad.roas < 1.5 && ad.spend >= 30) {
      ad.action = { icon: '🔍', text: 'לבדוק דף נחיתה', detail: 'CTR גבוה (' + ad.ctr.toFixed(2) + '%) אבל ROAS נמוך — בעיה בהמרה', cls: 'action-check' };
    } else if (ad.spend >= 50 && ad.roas >= 1 && ad.roas < 1.5) {
      ad.action = { icon: '⏸️', text: 'להקטין תקציב', detail: 'ROAS של ' + ad.roas.toFixed(2) + ' — על הגבול, לצמצם', cls: 'action-reduce' };
    } else if (ad.spend < 30 && ad.roas === 0) {
      ad.action = { icon: '⏳', text: 'לחכות לנתונים', detail: 'הוצאה נמוכה — עדיין אין מספיק דאטה', cls: 'action-wait' };
    } else if (ad.roas >= 1.5 && ad.roas < 3) {
      ad.action = { icon: '👀', text: 'לעקוב', detail: 'ביצועים סבירים — ROAS ' + ad.roas.toFixed(2), cls: 'action-watch' };
    } else {
      ad.action = null;
    }
  });
}

function renderFlagsHtml(ad) {
  var html = '';

  /* Action recommendation */
  if (ad.action) {
    html += '<div class="ad-action ' + ad.action.cls + '" title="' + escAttr(ad.action.detail) + '">'
      + '<span class="action-icon">' + ad.action.icon + '</span>'
      + '<span class="action-text">' + ad.action.text + '</span>'
      + '</div>';
  }

  /* Flags */
  if (ad.flags && ad.flags.length > 0) {
    html += '<div class="ad-flags">';
    ad.flags.forEach(function(f) {
      html += '<span class="ad-flag ' + f.cls + '">' + f.label + '</span>';
    });
    html += '</div>';
  }
  return html;
}

function renderInsightsHtml(ad) {
  /* Full version for modal — shows action detail text */
  var html = '';
  if (ad.action) {
    html += '<div class="ad-action ' + ad.action.cls + '" style="margin-top:12px;padding:10px 14px;font-size:13px">'
      + '<span class="action-icon" style="font-size:20px">' + ad.action.icon + '</span>'
      + '<div style="flex:1"><div class="action-text">' + ad.action.text + '</div>'
      + '<div style="font-weight:400;font-size:11px;margin-top:2px;opacity:.85">' + esc(ad.action.detail) + '</div>'
      + '</div></div>';
  }
  if (ad.flags && ad.flags.length > 0) {
    html += '<div class="ad-flags" style="margin-top:8px">';
    ad.flags.forEach(function(f) {
      html += '<span class="ad-flag ' + f.cls + '" style="font-size:11px;padding:4px 10px">' + f.label + '</span>';
    });
    html += '</div>';
  }
  return html;
}

/* ============================================
   4. FETCH DATA — via Worker /api/ads
   ============================================ */

function fetchData() {
  if (!WORKER_URL) return;

  var period = document.getElementById('periodSelect').value;

  document.getElementById('cardsGrid').innerHTML = '<div class="loading"><span class="spinner"></span> טוען נתונים מהשרת...</div>';
  document.getElementById('expandedGrid').innerHTML = '';
  document.getElementById('compactGrid').innerHTML = '';
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('metricsBar').innerHTML = '';
  document.getElementById('analysisSection').classList.add('hidden');

  fetch(WORKER_URL + '/api/ads', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date_preset: period })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Worker returned HTTP ' + r.status);
    return r.json();
  })
  .then(function(json) {
    if (json.ok === false || json.error) {
      throw new Error(typeof json.error === 'string' ? json.error : JSON.stringify(json.error));
    }

    var ads = json.ads || [];
    if (ads.length === 0) {
      document.getElementById('cardsGrid').innerHTML = '<div class="loading">אין נתונים לתקופה הנבחרת</div>';
      return;
    }

    adsData = ads.map(enrichAd);
    computeAdFlags();
    updateFilterCounts();
    applySort();
    fetchThumbnails();
  })
  .catch(function(err) {
    document.getElementById('cardsGrid').innerHTML = '<div class="loading" style="color:var(--red)">שגיאה בטעינת נתונים: ' + esc(err.message || String(err)) + '<br><br><button onclick="fetchData()" style="padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">נסה שוב</button></div>';
  });
}

/* ============================================
   4b. FETCH THUMBNAILS — lightweight second step
   ============================================ */

function fetchThumbnails() {
  if (adsData.length === 0) return;

  var adIds = adsData.map(function(ad) { return ad.id; });

  fetch(WORKER_URL + '/api/thumbnails', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ad_ids: adIds })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    if (!json.ok || !json.thumbnails) return;

    var changed = false;
    adsData.forEach(function(ad) {
      if (json.thumbnails[ad.id]) {
        ad.thumbnail = json.thumbnails[ad.id];
        changed = true;
      }
    });

    if (changed) {
      renderCards();
      if (currentView === 'expanded') renderExpandedCards();
      if (currentView === 'compact') renderCompactCards();
      renderTable();
    }
  })
  .catch(function() {
    // Silently fail — cards still work with placeholder
  });
}

/* ============================================
   5. SORT
   ============================================ */

function setFilter(filter) {
  activeFilter = filter;
  /* Update pill UI */
  var pills = document.querySelectorAll('.filter-pill');
  for (var i = 0; i < pills.length; i++) {
    pills[i].classList.toggle('active', pills[i].getAttribute('data-filter') === filter);
  }
  applySort();
  updateFilterCounts();
}

function getFilteredAds() {
  if (activeFilter === 'all') return adsData;
  if (activeFilter === 'has-flags') {
    return adsData.filter(function(ad) { return ad.flags && ad.flags.length > 0; });
  }
  return adsData.filter(function(ad) {
    return ad.action && ad.action.cls === activeFilter;
  });
}

function updateFilterCounts() {
  var counts = { 'all': adsData.length, 'has-flags': 0 };
  var actionTypes = ['action-stop','action-scale','action-grow','action-refresh','action-check','action-reduce','action-wait','action-watch'];
  actionTypes.forEach(function(t) { counts[t] = 0; });
  adsData.forEach(function(ad) {
    if (ad.flags && ad.flags.length > 0) counts['has-flags']++;
    if (ad.action) counts[ad.action.cls] = (counts[ad.action.cls] || 0) + 1;
  });
  var pills = document.querySelectorAll('.filter-pill');
  for (var i = 0; i < pills.length; i++) {
    var f = pills[i].getAttribute('data-filter');
    var c = counts[f] || 0;
    var existing = pills[i].querySelector('.filter-count');
    if (existing) existing.remove();
    if (c > 0 || f === 'all') {
      var span = document.createElement('span');
      span.className = 'filter-count';
      span.textContent = ' (' + c + ')';
      pills[i].appendChild(span);
    }
  }
}

function applySort() {
  var val = document.getElementById('sortSelect').value;
  var parts = val.split('_');
  var field = parts[0];
  var dir = parts[parts.length - 1];

  adsData.sort(function(a, b) {
    var va = a[field] || 0;
    var vb = b[field] || 0;
    return dir === 'desc' ? (vb - va) : (va - vb);
  });

  renderMetrics();
  renderCards();
  if (currentView === 'expanded') renderExpandedCards();
  if (currentView === 'compact') renderCompactCards();
  renderTable();
}

/* ============================================
   6. RENDER METRICS
   ============================================ */

function renderMetrics() {
  var filtered = getFilteredAds();
  var totalSpend = 0, totalRevenue = 0, totalPurchases = 0;
  filtered.forEach(function(ad) {
    totalSpend += ad.spend; totalRevenue += ad.revenue; totalPurchases += ad.purchases;
  });
  var totalRoas = totalSpend > 0 ? (totalRevenue / totalSpend).toFixed(2) : '0';
  var countLabel = activeFilter === 'all' ? filtered.length.toString() : filtered.length + '/' + adsData.length;
  document.getElementById('metricsBar').innerHTML =
    metricBox('הוצאה כוללת', formatNIS(totalSpend))
    + metricBox('הכנסה כוללת', formatNIS(totalRevenue))
    + metricBox('ROAS כולל', totalRoas + 'x')
    + metricBox('רכישות', totalPurchases.toLocaleString())
    + metricBox('קריאייטיבים', countLabel);
}

function metricBox(label, value) {
  return '<div class="metric-card"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}

/* ============================================
   7. RENDER CARDS (default view)
   ============================================ */

function renderCards() {
  var filtered = getFilteredAds();
  if (filtered.length === 0) {
    document.getElementById('cardsGrid').innerHTML = '<div class="loading">' + (activeFilter === 'all' ? 'אין נתונים' : 'אין מודעות בקטגוריה זו') + '</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(ad) {
    var i = adsData.indexOf(ad);
    var sb = statusBadge(ad.status);
    var thumbHtml = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '&#128444;&#65039;';
    var carouselBadge = (ad.creativeType === 'carousel' && ad.carouselCount > 0)
      ? '<div class="badge-carousel">&#127904; x' + ad.carouselCount + '</div>' : '';
    var headlineHtml = ad.headline
      ? '<div class="headline" title="' + escAttr(ad.headline) + '">' + esc(truncate(ad.headline, 50)) + '</div>' : '';

    html += '<div class="ad-card" onclick="openModal(' + i + ')">'
      + '<div class="thumb" id="thumb-' + i + '">' + thumbHtml + '</div>'
      + '<button class="preview-toggle" onclick="togglePreview(event,' + i + ',\'thumb-' + i + '\')">&#128065; Preview</button>'
      + '<div class="badge-status ' + sb.cls + '">' + sb.label + '</div>'
      + '<div class="badge-roas">ROAS ' + ad.roas.toFixed(2) + '</div>'
      + '<div class="badge-media">' + esc(ad.mediaLabel) + '</div>'
      + carouselBadge
      + '<div class="info">'
      + '<div class="name" title="' + escAttr(ad.name) + '">' + esc(ad.name) + '</div>'
      + headlineHtml
      + '<div class="adset" title="' + escAttr(ad.adset) + '">' + esc(ad.adset) + '</div>'
      + '<div class="stats">'
      + statCell('הוצאה', formatNIS(ad.spend))
      + statCell('CTR', ad.ctr.toFixed(2) + '%')
      + statCell('המרות', String(ad.purchases))
      + statCell('Freq', ad.frequency.toFixed(2))
      + '</div>'
      + renderFlagsHtml(ad)
      + '</div></div>';
  });
  document.getElementById('cardsGrid').innerHTML = html;
}

function statCell(label, value, cls) {
  return '<div class="stat' + (cls ? ' ' + cls : '') + '"><span>' + label + ': </span>' + value + '</div>';
}

function firstWords(text, count) {
  if (!text) return '';
  var words = text.trim().split(/\s+/).slice(0, count || 6);
  return words.join(' ');
}

function extractOpener(ad) {
  // Use bodyText or headline if available
  if (ad.bodyText) return ad.bodyText;
  if (ad.headline) return ad.headline;
  // Otherwise extract descriptive part from ad name
  // Pattern: "date → price → ID_num_description_[format]"
  var parts = ad.name.split('\u2192'); // split on →
  if (parts.length >= 3) {
    var tail = parts[parts.length - 1].trim();
    // Remove leading numeric ID_number_ prefix
    tail = tail.replace(/^\d+_\d+_/, '');
    // Remove trailing format brackets like _[Banner, Story]
    tail = tail.replace(/_\[[^\]]*\]\s*$/, '');
    // Clean up: replace dashes/underscores with spaces, remove [coupon: ]
    tail = tail.replace(/\[coupon:\s*\]/gi, '').replace(/[-_]+/g, ' ').trim();
    // Remove empty brackets
    tail = tail.replace(/\[\s*\]/g, '').trim();
    if (tail) return tail;
  }
  return '';
}

/* ============================================
   8. RENDER EXPANDED CARDS (large creative view)
   ============================================ */

function renderExpandedCards() {
  var filtered = getFilteredAds();
  if (filtered.length === 0) {
    document.getElementById('expandedGrid').innerHTML = '<div class="loading">' + (activeFilter === 'all' ? 'אין נתונים' : 'אין מודעות בקטגוריה זו') + '</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(ad) {
    var i = adsData.indexOf(ad);
    var sb = statusBadge(ad.status);
    var thumbHtml = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '&#128444;&#65039;';
    var carouselBadge = (ad.creativeType === 'carousel' && ad.carouselCount > 0)
      ? '<div class="badge-carousel">&#127904; x' + ad.carouselCount + '</div>' : '';
    var headlineHtml = ad.headline
      ? '<div class="headline" title="' + escAttr(ad.headline) + '">' + esc(truncate(ad.headline, 80)) + '</div>' : '';
    var bodyHtml = ad.bodyText
      ? '<div class="body-text">' + esc(truncate(ad.bodyText, 120)) + '</div>' : '';

    html += '<div class="expanded-card" onclick="openModal(' + i + ')">'
      + '<div class="thumb" id="exp-thumb-' + i + '">' + thumbHtml + '</div>'
      + '<button class="preview-toggle" onclick="togglePreview(event,' + i + ',\'exp-thumb-' + i + '\')">&#128065; Preview</button>'
      + '<div class="badge-status ' + sb.cls + '">' + sb.label + '</div>'
      + '<div class="badge-roas">ROAS ' + ad.roas.toFixed(2) + '</div>'
      + '<div class="badge-media">' + esc(ad.mediaLabel) + '</div>'
      + carouselBadge
      + '<div class="info">';

    var openerText = firstWords(extractOpener(ad), 6);
    if (openerText) {
      html += '<div class="opener" title="' + escAttr(ad.bodyText || ad.headline) + '">' + esc(openerText) + '</div>';
    }

    html += '<div class="name" title="' + escAttr(ad.name) + '">' + esc(ad.name) + '</div>'
      + headlineHtml
      + bodyHtml
      + '<div class="adset" title="' + escAttr(ad.adset) + '">' + esc(ad.adset) + '</div>'
      + '<div class="stats">'
      + statCell('הוצאה', formatNIS(ad.spend))
      + statCell('הכנסה', formatNIS(ad.revenue))
      + statCell('ROAS', ad.roas.toFixed(2), 'roas-emphasis')
      + statCell('CTR', ad.ctr.toFixed(2) + '%')
      + statCell('המרות', String(ad.purchases))
      + statCell('Freq', ad.frequency.toFixed(2))
      + '</div>'
      + renderFlagsHtml(ad)
      + '</div></div>';
  });
  document.getElementById('expandedGrid').innerHTML = html;

  /* Attach hover-preview to each expanded card thumb */
  adsData.forEach(function(ad, i) {
    var card = document.querySelector('#exp-thumb-' + i);
    if (!card) return;
    var parentCard = card.closest('.expanded-card');
    if (!parentCard) return;
    var hoverTimer = null;

    parentCard.addEventListener('mouseenter', function() {
      /* Don't hover-preview if already locked via click */
      if (ad.previewLocked) return;
      hoverTimer = setTimeout(function() {
        var thumb = document.getElementById('exp-thumb-' + i);
        if (!thumb || ad.previewState === 'preview') return;

        if (ad.previewBody) {
          thumb.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(ad.previewBody) + '" style="width:100%;height:100%;border:none;pointer-events:none"></iframe>';
          ad.previewState = 'preview';
          var btn = parentCard.querySelector('.preview-toggle');
          if (btn) btn.innerHTML = '&#128444;&#65039; Asset';
          return;
        }

        thumb.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim)"><span class="spinner"></span></div>';

        fetch(WORKER_URL + '/api/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ad_id: ad.id })
        })
        .then(function(r) { return r.json(); })
        .then(function(json) {
          if (json.body) {
            ad.previewBody = json.body;
            ad.previewLoaded = true;
            ad.previewState = 'preview';
            var t = document.getElementById('exp-thumb-' + i);
            if (t) t.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(json.body) + '" style="width:100%;height:100%;border:none;pointer-events:none"></iframe>';
            var btn = parentCard.querySelector('.preview-toggle');
            if (btn) btn.innerHTML = '&#128444;&#65039; Asset';
          }
        })
        .catch(function() {});
      }, 300);
    });

    parentCard.addEventListener('mouseleave', function() {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
      /* Don't revert if preview is locked via click */
      if (ad.previewLocked) return;
      if (ad.previewState === 'preview') {
        var thumb = document.getElementById('exp-thumb-' + i);
        if (thumb) {
          thumb.innerHTML = ad.thumbnail
            ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" loading="lazy">'
            : '&#128444;&#65039;';
        }
        ad.previewState = 'asset';
        var btn = parentCard.querySelector('.preview-toggle');
        if (btn) btn.innerHTML = '&#128065; Preview';
      }
    });
  });
}

/* ============================================
   9. RENDER COMPACT CARDS
   ============================================ */

function renderCompactCards() {
  var filtered = getFilteredAds();
  if (filtered.length === 0) {
    document.getElementById('compactGrid').innerHTML = '<div class="loading">' + (activeFilter === 'all' ? 'אין נתונים' : 'אין מודעות בקטגוריה זו') + '</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(ad) {
    var i = adsData.indexOf(ad);
    var sb = statusBadge(ad.status);
    var thumbHtml = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '&#128444;&#65039;';
    html += '<div class="compact-card" onclick="openModal(' + i + ')">'
      + '<div class="compact-thumb">' + thumbHtml + '</div>'
      + '<div class="compact-badge-roas">ROAS ' + ad.roas.toFixed(2) + '</div>'
      + '<div class="compact-badge-status ' + sb.cls + '">' + sb.label + '</div>'
      + '<div class="compact-info">'
      + '<div class="compact-name" title="' + escAttr(ad.name) + '">' + esc(ad.name) + '</div>'
      + '<div class="compact-stats">'
      + '<div class="cstat">CTR <b>' + ad.ctr.toFixed(2) + '%</b></div>'
      + '<div class="cstat">Spend <b>' + formatNIS(ad.spend) + '</b></div>'
      + '<div class="cstat">Conv <b>' + ad.purchases + '</b></div>'
      + '<div class="cstat">Freq <b>' + ad.frequency.toFixed(2) + '</b></div>'
      + '</div></div></div>';
  });
  document.getElementById('compactGrid').innerHTML = html;
}

/* ============================================
   10. RENDER TABLE
   ============================================ */

      : '&#128444;&#65039;';

/* ============================================
   11. VIEW TOGGLE
   ============================================ */

function setView(view) {
  currentView = view;
  document.getElementById('btnCards').classList.toggle('active', view === 'cards');
  document.getElementById('btnExpanded').classList.toggle('active', view === 'expanded');
  document.getElementById('btnCompact').classList.toggle('active', view === 'compact');
  document.getElementById('btnTable').classList.toggle('active', view === 'table');
  document.getElementById('cardsGrid').classList.toggle('hidden', view !== 'cards');
  document.getElementById('expandedGrid').classList.toggle('hidden', view !== 'expanded');
  document.getElementById('compactGrid').classList.toggle('hidden', view !== 'compact');
  document.getElementById('tableWrap').classList.toggle('hidden', view !== 'table');
  if (view === 'expanded') renderExpandedCards();
  if (view === 'compact') renderCompactCards();
}

/* ============================================
   12. PREVIEW TOGGLE — via Worker /api/preview
   ============================================ */

function togglePreview(event, index, thumbId) {
  event.stopPropagation();
  var ad = adsData[index];
  var thumb = document.getElementById(thumbId);
  var btn = event.currentTarget;

  /* If currently showing locked preview → unlock and revert to asset */
  if (ad.previewLocked) {
    thumb.innerHTML = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" loading="lazy">'
      : '&#128444;&#65039;';
    ad.previewState = 'asset';
    ad.previewLocked = false;
    btn.innerHTML = '&#128065; Preview';
    return;
  }

  /* If preview already cached → lock it in place (clickable iframe) */
  if (ad.previewBody) {
    showPreviewInThumb(thumb, ad, btn, true);
    return;
  }

  /* Fetch preview from API, then lock */
  thumb.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim)"><span class="spinner"></span></div>';

  fetch(WORKER_URL + '/api/preview', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ad_id: ad.id })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    if (json.body) {
      ad.previewBody = json.body;
      ad.previewLoaded = true;
      showPreviewInThumb(thumb, ad, btn, true);
    } else {
      thumb.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:12px">Preview לא זמין</div>';
    }
  })
  .catch(function() {
    thumb.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--red);font-size:12px">שגיאה בטעינה</div>';
  });
}

function showPreviewInThumb(thumb, ad, btn, locked) {
  var pointerStyle = locked ? 'pointer-events:auto' : 'pointer-events:none';
  thumb.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(ad.previewBody) + '" style="width:100%;height:100%;border:none;' + pointerStyle + '"></iframe>';
  ad.previewState = 'preview';
  ad.previewLocked = !!locked;
  btn.innerHTML = locked ? '&#128274; Asset' : '&#128444;&#65039; Asset';
}

/* ============================================
   13. MODAL WITH AD PREVIEW — via Worker
   ============================================ */

function openModal(index) {
  var ad = adsData[index];
  if (!ad) return;

  var typeTag = '';
  if (ad.creativeType === 'carousel') {
    typeTag = ' <span style="font-size:12px;color:var(--purple)">(&#127904; ' + ad.mediaLabel + ' — ' + ad.carouselCount + ' כרטיסים)</span>';
  }

  var html = '<div class="modal-title">' + esc(ad.name) + typeTag + '</div>'
    + '<div class="modal-sub">' + esc(ad.campaign) + ' &bull; ' + esc(ad.adset) + '</div>'
    + '<div class="modal-stats">'
    + msStat('הוצאה', formatNIS(ad.spend))
    + msStat('הכנסה', formatNIS(ad.revenue))
    + msStat('ROAS', ad.roas.toFixed(2) + 'x')
    + msStat('רכישות', String(ad.purchases))
    + msStat('חשיפות', ad.impressions.toLocaleString())
    + msStat('קליקים', ad.clicks.toLocaleString())
    + msStat('CTR', ad.ctr.toFixed(2) + '%')
    + msStat('CPC', formatNIS(ad.cpc))
    + msStat('Reach', ad.reach.toLocaleString())
    + msStat('Frequency', ad.frequency.toFixed(2))
    + '</div>'
    + renderInsightsHtml(ad)
    + '<div class="preview-label">תצוגה מקדימה של המודעה:</div>'
    + '<div class="ad-preview-wrap" id="adPreviewWrap">'
    + '<div class="pv-msg"><span class="spinner"></span>&nbsp; טוען תצוגה מקדימה...</div>'
    + '</div>';

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
  loadAdPreview(ad);
}

function loadAdPreview(ad) {
  if (ad.previewBody) {
    var wrap = document.getElementById('adPreviewWrap');
    if (wrap) wrap.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(ad.previewBody) + '"></iframe>';
    return;
  }

  fetch(WORKER_URL + '/api/preview', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ad_id: ad.id })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    var wrap = document.getElementById('adPreviewWrap');
    if (!wrap) return;
    if (json.error || !json.body) {
      wrap.innerHTML = '<div class="pv-msg" style="font-size:12px">לא ניתן לטעון תצוגה מקדימה</div>';
      return;
    }
    ad.previewBody = json.body;
    ad.previewLoaded = true;
    wrap.innerHTML = '<iframe sandbox="allow-scripts allow-same-origin" srcdoc="' + escAttr(ad.previewBody) + '"></iframe>';
  })
  .catch(function() {
    var wrap = document.getElementById('adPreviewWrap');
    if (wrap) wrap.innerHTML = '<div class="pv-msg" style="font-size:12px">שגיאה בטעינת תצוגה מקדימה</div>';
  });
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function msStat(label, value) {
  return '<div class="ms"><div class="ms-label">' + label + '</div><div class="ms-value">' + value + '</div></div>';
}

/* ============================================
   14. CLAUDE AI ANALYSIS — via Worker /api/insights
   ============================================ */

function renderAnalysis(ins, container) {
  if (!ins || ins.raw_text) {
    container.textContent = ins ? ins.raw_text : '';
    return;
  }
  var html = '';

  // Summary
  if (ins.summary_he) {
    html += '<div class="an-section an-summary"><div class="an-label">📊 סיכום אסטרטגי</div><div class="an-body">' + esc(ins.summary_he) + '</div></div>';
  }

  // Creative patterns
  if (ins.creative_patterns) {
    var cp = ins.creative_patterns;
    html += '<div class="an-section"><div class="an-label">🎨 ניתוח קריאייטיב</div>';
    if (cp.winning_patterns) html += '<div class="an-row"><span class="an-tag an-green">✅ מה עובד</span><span class="an-text">' + esc(cp.winning_patterns) + '</span></div>';
    if (cp.losing_patterns) html += '<div class="an-row"><span class="an-tag an-red">❌ מה לא עובד</span><span class="an-text">' + esc(cp.losing_patterns) + '</span></div>';
    if (cp.next_creative_recommendation) html += '<div class="an-row"><span class="an-tag an-purple">💡 הקריאייטיב הבא</span><span class="an-text">' + esc(cp.next_creative_recommendation) + '</span></div>';
    html += '</div>';
  }

  // Audience insights
  if (ins.audience_insights) {
    var ai = ins.audience_insights;
    html += '<div class="an-section"><div class="an-label">👥 תובנות קהלים</div>';
    if (ai.what_works) html += '<div class="an-row"><span class="an-tag an-green">✅ מה עובד</span><span class="an-text">' + esc(ai.what_works) + '</span></div>';
    if (ai.fatigue_signals) html += '<div class="an-row"><span class="an-tag an-yellow">⚠️ סימני עייפות</span><span class="an-text">' + esc(ai.fatigue_signals) + '</span></div>';
    if (ai.recommendations) html += '<div class="an-row"><span class="an-tag an-purple">💡 המלצות</span><span class="an-text">' + esc(ai.recommendations) + '</span></div>';
    html += '</div>';
  }

  // Budget efficiency
  if (ins.budget_efficiency) {
    var be = ins.budget_efficiency;
    html += '<div class="an-section"><div class="an-label">💰 יעילות תקציב</div>';
    if (be.overspend) html += '<div class="an-row"><span class="an-tag an-red">🔻 להקטין</span><span class="an-text">' + esc(be.overspend) + '</span></div>';
    if (be.underspend) html += '<div class="an-row"><span class="an-tag an-green">🚀 להגדיל</span><span class="an-text">' + esc(be.underspend) + '</span></div>';
    html += '</div>';
  }

  // Top winners
  if (ins.top_winners && ins.top_winners.length) {
    html += '<div class="an-section"><div class="an-label">🏆 מנצחים</div>';
    ins.top_winners.forEach(function(w) {
      html += '<div class="an-row"><span class="an-tag an-green">WIN</span><span class="an-text"><b>' + esc(w.ad_name) + '</b> — ' + esc(w.why) + '</span></div>';
    });
    html += '</div>';
  }

  // Stop immediately
  if (ins.stop_immediately && ins.stop_immediately.length) {
    html += '<div class="an-section"><div class="an-label">💀 לעצור מיד</div>';
    ins.stop_immediately.forEach(function(s) {
      html += '<div class="an-row"><span class="an-tag an-red">STOP</span><span class="an-text"><b>' + esc(s.ad_name) + '</b> — ' + esc(s.why) + '</span></div>';
    });
    html += '</div>';
  }

  // Action items
  if (ins.action_items && ins.action_items.length) {
    html += '<div class="an-section"><div class="an-label">🎯 פעולות מיידיות</div><ol class="an-list">';
    ins.action_items.forEach(function(a) {
      html += '<li>' + esc(a) + '</li>';
    });
    html += '</ol></div>';
  }

  container.innerHTML = html;
}

function runAnalysis() {
  if (adsData.length === 0) {
    alert('אין נתונים לנתח. טעני נתונים קודם.');
    return;
  }

  var btn = document.getElementById('analysisBtn');
  btn.disabled = true;
  btn.textContent = '⏳ מנתח נתונים...';

  var summary = adsData.map(function(ad) {
    return {
      name: ad.name, adset: ad.adset, campaign: ad.campaign,
      spend: ad.spend.toFixed(2), revenue: ad.revenue.toFixed(2),
      roas: ad.roas.toFixed(2), purchases: ad.purchases,
      ctr: ad.ctr.toFixed(2), cpc: ad.cpc.toFixed(2),
      frequency: ad.frequency.toFixed(2), impressions: ad.impressions,
      status: ad.status, type: ad.creativeType
    };
  });

  fetch(WORKER_URL + '/api/insights', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ads: summary })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    btn.disabled = false;
    btn.textContent = '🤖 ניתוח Claude AI';

    if (json.error) {
      alert('שגיאת ניתוח: ' + (json.error.message || JSON.stringify(json.error)));
      return;
    }

    var insights = json.insights || {};
    renderAnalysis(insights, document.getElementById('analysisContent'));
    document.getElementById('analysisSection').classList.remove('hidden');
    document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth' });
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = '🤖 ניתוח Claude AI';
    alert('שגיאת רשת: ' + err.message);
  });
}

/* ============================================
   15. HELPER FUNCTIONS
   ============================================ */

function statusBadge(status) {
  switch (status) {
    case 'win':  return { cls: 'badge-win',  label: 'WIN 🟢' };
    case 'ok':   return { cls: 'badge-ok',   label: 'OK 🟡' };
    case 'stop': return { cls: 'badge-stop', label: 'STOP 🔴' };
    default:     return { cls: 'badge-new',  label: 'חדש ⚪' };
  }
}

function formatNIS(n) {
  return '₪' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.substring(0, max) + '...' : s;
}

   16. KEYBOARD SHORTCUTS

  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('show');
  }
});

syncPeriods();
if (checkSession()) { showApp(); fetchData(); }

document.getElementById('inputPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
