<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#00ff9d;--text:#e0e0e0;--dim:#888;--red:#ff4d6a;--yellow:#ffd700;--green:#00ff9d}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Login */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:90%;max-width:420px;text-align:center}
.login-box h1{color:var(--accent);margin-bottom:8px;font-size:24px}
.login-box p{color:var(--dim);margin-bottom:24px;font-size:14px}
.login-box input{width:100%;padding:12px 16px;margin-bottom:12px;background:#1a1a2e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;direction:ltr;text-align:left}
.login-box input::placeholder{color:#555}
.login-box button{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
.login-box button:hover{opacity:.85}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;color:var(--accent)}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.topbar-actions select,.topbar-actions button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer}
.topbar-actions button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.topbar-actions button:hover{opacity:.85}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:20px 24px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.metric-card .label{font-size:12px;color:var(--dim);margin-bottom:4px}
.metric-card .value{font-size:22px;font-weight:700;color:var(--accent)}

/* View toggle */
.view-toggle{display:flex;gap:8px;padding:0 24px 12px;justify-content:flex-start}
.view-toggle button{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:13px}
.view-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 24px 24px}

/* Card */
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.ad-card:hover{transform:translateY(-3px);border-color:var(--accent)}
.ad-card .thumb{width:100%;height:180px;object-fit:cover;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--dim)}
.ad-card .thumb img{width:100%;height:100%;object-fit:cover}
.ad-card .badge-status{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.badge-win{background:rgba(0,255,157,.2);color:var(--green)}
.badge-ok{background:rgba(255,215,0,.2);color:var(--yellow)}
.badge-stop{background:rgba(255,77,106,.2);color:var(--red)}
.badge-new{background:rgba(255,255,255,.15);color:#ccc}
.ad-card .badge-roas{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(0,0,0,.6);color:#fff;backdrop-filter:blur(8px)}
.ad-card .info{padding:14px}
.ad-card .info .name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .adset{font-size:11px;color:var(--dim);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-card .info .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ad-card .info .stats .stat{font-size:12px}
.ad-card .info .stats .stat span{color:var(--dim)}

/* Table */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap th{background:var(--card);padding:10px 12px;text-align:right;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
.table-wrap td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.table-wrap tr:hover{background:rgba(0,255,157,.03)}
.table-wrap .thumb-cell{width:50px;height:50px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:20px}
.table-wrap .thumb-cell img{width:100%;height:100%;object-fit:cover}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:900;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal .close-btn{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer}
.modal .close-btn:hover{color:var(--text)}
.modal .modal-img{width:100%;max-height:300px;object-fit:contain;border-radius:8px;margin-bottom:16px;background:#1a1a2e}
.modal .modal-title{font-size:18px;font-weight:700;margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(--dim);margin-bottom:16px}
.modal .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal .modal-stats .ms{background:#1a1a2e;padding:12px;border-radius:8px}
.modal .modal-stats .ms .ms-label{font-size:11px;color:var(--dim)}
.modal .modal-stats .ms .ms-value{font-size:18px;font-weight:700}

/* Analysis */
.analysis-section{padding:0 24px 24px}
.analysis-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.analysis-box h3{color:var(--accent);margin-bottom:12px}
.analysis-box .analysis-content{white-space:pre-wrap;line-height:1.7;font-size:14px}
.analysis-btn{display:block;margin:0 24px 16px;padding:12px 24px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:calc(100% - 48px)}
.analysis-btn:hover{opacity:.85}
.analysis-btn:disabled{opacity:.5;cursor:not-allowed}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--dim);font-size:16px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Bottom bar */
.bottombar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;flex-wrap:wrap}
.bottombar select,.bottombar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#1a1a2e;color:var(--text);font-size:13px;cursor:pointer}
.bottombar button.danger{color:var(--red);border-color:rgba(255,77,106,.3)}
.bottombar button.primary{background:var(--accent);color:#000;border:none;font-weight:700}
.main-content{padding-bottom:60px}
.hidden{display:none!important}

/* Responsive */
@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .topbar{padding:12px 16px}
  .topbar h1{font-size:16px}
}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>Meta Ads Dashboard</h1>
    <p>הזן את פרטי החיבור לחשבון המטא שלך</p>
    <input type="password" id="tokenInput" placeholder="Access Token">
    <input type="text" id="accountInput" placeholder="Ad Account ID" value="882300848610076">
    <input type="password" id="claudeKeyInput" placeholder="Claude API Key">
    <input type="text" id="workerUrlInput" placeholder="Cloudflare Worker URL (למשל: https://claude-proxy.xxx.workers.dev)">
    <button onclick="doLogin()">התחבר</button>
  </div>
</div>

<!-- Top Bar -->
<div class="topbar" id="topbar" style="display:none">
  <h1>Meta Ads Dashboard</h1>
  <div class="topbar-actions">
    <select id="periodSelect">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">טען נתונים</button>
  </div>
</div>

<!-- Main Content -->
<div class="main-content hidden" id="mainContent">
  <!-- Metrics -->
  <div class="metrics" id="metricsBar"></div>

  <!-- View Toggle -->
  <div class="view-toggle">
    <button class="active" id="btnCards" onclick="setView('cards')">כרטיסים</button>
    <button id="btnTable" onclick="setView('table')">טבלה</button>
  </div>

  <!-- Cards Grid -->
  <div class="grid" id="cardsGrid"></div>

  <!-- Table -->
  <div class="table-wrap hidden" id="tableWrap"></div>

  <!-- Analysis -->
  <button class="analysis-btn" id="analysisBtn" onclick="runAnalysis()">🤖 ניתוח Claude AI</button>
  <div class="analysis-section hidden" id="analysisSection">
    <div class="analysis-box">
      <h3>ניתוח Claude AI</h3>
      <div class="analysis-content" id="analysisContent"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.remove('show')">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottombar hidden" id="bottomBar">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select id="periodSelectBottom">
      <option value="today">היום</option>
      <option value="yesterday">אתמול</option>
      <option value="last_7d" selected>7 ימים</option>
      <option value="last_14d">14 ימים</option>
      <option value="last_30d">30 ימים</option>
      <option value="this_month">חודש נוכחי</option>
      <option value="last_month">חודש קודם</option>
    </select>
    <button class="primary" onclick="fetchData()">🔄 רענן</button>
  </div>
  <button class="danger" onclick="doLogout()">🚪 התנתק</button>
</div>

<script>
/* =========================================
   META ADS DASHBOARD - All globals
   ========================================= */

var TOKEN = '';
var ACCOUNT_ID = '';
var CLAUDE_KEY = '';
var WORKER_URL = '';
var adsData = [];
var currentView = 'cards';

/* ---- Login / Logout ---- */

function doLogin() {
  var t = document.getElementById('tokenInput').value.trim();
  var a = document.getElementById('accountInput').value.trim();
  var c = document.getElementById('claudeKeyInput').value.trim();
  var w = document.getElementById('workerUrlInput').value.trim().replace(/\/+$/, '');
  if (!t) { alert('יש להזין Access Token'); return; }
  if (!a) { alert('יש להזין Ad Account ID'); return; }
  TOKEN = t;
  ACCOUNT_ID = a;
  CLAUDE_KEY = c;
  WORKER_URL = w;
  sessionStorage.setItem('meta_token', t);
  sessionStorage.setItem('meta_account', a);
  if (c) sessionStorage.setItem('claude_key', c);
  if (w) sessionStorage.setItem('worker_url', w);
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('topbar').style.display = '';
  document.getElementById('mainContent').classList.remove('hidden');
  document.getElementById('bottomBar').classList.remove('hidden');
  fetchData();
}

function doLogout() {
  sessionStorage.clear();
  TOKEN = '';
  ACCOUNT_ID = '';
  CLAUDE_KEY = '';
  WORKER_URL = '';
  adsData = [];
  document.getElementById('loginOverlay').style.display = '';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('bottomBar').classList.add('hidden');
  document.getElementById('tokenInput').value = '';
  document.getElementById('claudeKeyInput').value = '';
}

/* ---- Restore session ---- */

(function restoreSession() {
  var t = sessionStorage.getItem('meta_token');
  var a = sessionStorage.getItem('meta_account');
  var c = sessionStorage.getItem('claude_key');
  var w = sessionStorage.getItem('worker_url');
  if (t && a) {
    TOKEN = t;
    ACCOUNT_ID = a;
    CLAUDE_KEY = c || '';
    WORKER_URL = w || '';
    document.getElementById('tokenInput').value = t;
    document.getElementById('accountInput').value = a;
    if (c) document.getElementById('claudeKeyInput').value = c;
    if (w) document.getElementById('workerUrlInput').value = w;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('topbar').style.display = '';
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('bottomBar').classList.remove('hidden');
    fetchData();
  }
})();

/* ---- Sync period selects ---- */

document.getElementById('periodSelect').addEventListener('change', function() {
  document.getElementById('periodSelectBottom').value = this.value;
});
document.getElementById('periodSelectBottom').addEventListener('change', function() {
  document.getElementById('periodSelect').value = this.value;
});

/* ---- Fetch Data ---- */

function fetchData() {
  var period = document.getElementById('periodSelect').value;
  var insightsUrl = 'https://graph.facebook.com/v19.0/act_' + ACCOUNT_ID + '/insights'
    + '?fields=ad_id,ad_name,adset_name,campaign_name,impressions,clicks,spend,reach,frequency,ctr,cpc,actions,action_values'
    + '&level=ad&date_preset=' + period
    + '&limit=200&access_token=' + TOKEN;

  document.getElementById('cardsGrid').innerHTML = '<div class="loading"><span class="spinner"></span> טוען נתונים מ-Meta...</div>';
  document.getElementById('tableWrap').innerHTML = '';
  document.getElementById('metricsBar').innerHTML = '';

  fetch(insightsUrl)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.error) {
        document.getElementById('cardsGrid').innerHTML = '<div class="loading" style="color:var(--red)">שגיאה: ' + escHtml(json.error.message) + '</div>';
        return;
      }
      var data = json.data || [];
      if (data.length === 0) {
        document.getElementById('cardsGrid').innerHTML = '<div class="loading">אין נתונים לתקופה הנבחרת</div>';
        return;
      }
      adsData = data.map(parseAd);

      // Collect unique ad IDs to fetch creative IDs
      var adIds = adsData.map(function(ad) { return ad.id; }).filter(Boolean);
      if (adIds.length === 0) {
        renderMetrics(); renderCards(); renderTable();
        return;
      }

      // Fetch creative IDs via /ads endpoint (batch by filtering)
      var adsUrl = 'https://graph.facebook.com/v19.0/act_' + ACCOUNT_ID + '/ads'
        + '?fields=id,creative{id,thumbnail_url}'
        + '&filtering=[{"field":"id","operator":"IN","value":' + JSON.stringify(adIds) + '}]'
        + '&limit=200&access_token=' + TOKEN;

      return fetch(adsUrl)
        .then(function(r) { return r.json(); })
        .then(function(adsJson) {
          var creativeMap = {};
          if (adsJson.data) {
            adsJson.data.forEach(function(adObj) {
              if (adObj.creative) {
                creativeMap[adObj.id] = {
                  creativeId: adObj.creative.id || '',
                  thumbnail: adObj.creative.thumbnail_url || ''
                };
              }
            });
          }
          // Assign creative data to adsData
          adsData.forEach(function(ad) {
            if (creativeMap[ad.id]) {
              ad.creativeId = creativeMap[ad.id].creativeId;
              ad.thumbnail = creativeMap[ad.id].thumbnail;
            }
          });

          // For ads that got a creativeId but no thumbnail, fetch individually
          var thumbPromises = adsData.map(function(ad) {
            if (ad.creativeId && !ad.thumbnail) {
              return fetch('https://graph.facebook.com/v19.0/' + ad.creativeId + '?fields=thumbnail_url&access_token=' + TOKEN)
                .then(function(r) { return r.json(); })
                .then(function(j) { ad.thumbnail = j.thumbnail_url || ''; })
                .catch(function() { ad.thumbnail = ''; });
            }
            return Promise.resolve();
          });
          return Promise.all(thumbPromises);
        })
        .catch(function() { /* silently skip thumbnails on error */ });
    })
    .then(function() {
      if (adsData.length > 0) {
        renderMetrics();
        renderCards();
        renderTable();
      }
    })
    .catch(function(err) {
      document.getElementById('cardsGrid').innerHTML = '<div class="loading" style="color:var(--red)">שגיאת רשת: ' + escHtml(err.message) + '</div>';
    });
}

/* ---- Parse ad data ---- */

function parseAd(ad) {
  var spend = parseFloat(ad.spend) || 0;
  var purchases = 0;
  var revenue = 0;
  if (ad.actions) {
    ad.actions.forEach(function(a) {
      if (a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase') {
        purchases += parseInt(a.value) || 0;
      }
    });
  }
  if (ad.action_values) {
    ad.action_values.forEach(function(a) {
      if (a.action_type === 'purchase' || a.action_type === 'offsite_conversion.fb_pixel_purchase') {
        revenue += parseFloat(a.value) || 0;
      }
    });
  }
  var roas = spend > 0 ? revenue / spend : 0;
  var status = 'new';
  if (spend >= 50) {
    if (roas >= 3) status = 'win';
    else if (roas >= 1.5) status = 'ok';
    else status = 'stop';
  }
  return {
    id: ad.ad_id,
    name: ad.ad_name || 'ללא שם',
    adset: ad.adset_name || '',
    campaign: ad.campaign_name || '',
    spend: spend,
    impressions: parseInt(ad.impressions) || 0,
    clicks: parseInt(ad.clicks) || 0,
    reach: parseInt(ad.reach) || 0,
    frequency: parseFloat(ad.frequency) || 0,
    ctr: parseFloat(ad.ctr) || 0,
    cpc: parseFloat(ad.cpc) || 0,
    purchases: purchases,
    revenue: revenue,
    roas: roas,
    status: status,
    creativeId: (ad.creative && ad.creative.id) ? ad.creative.id : '',
    thumbnail: ''
  };
}

/* ---- Render Metrics ---- */

function renderMetrics() {
  var totalSpend = 0, totalRevenue = 0, totalPurchases = 0;
  adsData.forEach(function(ad) {
    totalSpend += ad.spend;
    totalRevenue += ad.revenue;
    totalPurchases += ad.purchases;
  });
  var totalRoas = totalSpend > 0 ? (totalRevenue / totalSpend).toFixed(2) : '0';
  var html = ''
    + metricHtml('הוצאה כוללת', formatCurrency(totalSpend))
    + metricHtml('הכנסה כוללת', formatCurrency(totalRevenue))
    + metricHtml('ROAS כולל', totalRoas + 'x')
    + metricHtml('רכישות', totalPurchases.toLocaleString())
    + metricHtml('קריאייטיבים', adsData.length.toString());
  document.getElementById('metricsBar').innerHTML = html;
}

function metricHtml(label, value) {
  return '<div class="metric-card"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}

/* ---- Render Cards ---- */

function renderCards() {
  var html = '';
  adsData.forEach(function(ad, i) {
    var statusBadge = getStatusBadge(ad.status);
    var thumbHtml = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="creative" onerror="this.parentNode.innerHTML=\'&#x1f5bc;&#xfe0f;\'">'
      : '\uD83D\uDDBC\uFE0F';
    html += '<div class="ad-card" onclick="openModal(' + i + ')">'
      + '<div class="thumb">' + thumbHtml + '</div>'
      + '<div class="badge-status ' + statusBadge.cls + '">' + statusBadge.text + '</div>'
      + '<div class="badge-roas">ROAS ' + ad.roas.toFixed(2) + '</div>'
      + '<div class="info">'
      + '<div class="name" title="' + escAttr(ad.name) + '">' + escHtml(ad.name) + '</div>'
      + '<div class="adset" title="' + escAttr(ad.adset) + '">' + escHtml(ad.adset) + '</div>'
      + '<div class="stats">'
      + '<div class="stat"><span>הוצאה: </span>' + formatCurrency(ad.spend) + '</div>'
      + '<div class="stat"><span>CTR: </span>' + ad.ctr.toFixed(2) + '%</div>'
      + '<div class="stat"><span>המרות: </span>' + ad.purchases + '</div>'
      + '<div class="stat"><span>Freq: </span>' + ad.frequency.toFixed(2) + '</div>'
      + '</div></div></div>';
  });
  document.getElementById('cardsGrid').innerHTML = html || '<div class="loading">אין נתונים</div>';
}

/* ---- Render Table ---- */

function renderTable() {
  var html = '<table><thead><tr>'
    + '<th></th><th>קריאייטיב</th><th>אדסט</th><th>הוצאה</th><th>ROAS</th><th>CTR</th><th>CPC</th><th>Freq</th><th>המרות</th><th>סטטוס</th>'
    + '</tr></thead><tbody>';
  adsData.forEach(function(ad, i) {
    var statusBadge = getStatusBadge(ad.status);
    var thumbHtml = ad.thumbnail
      ? '<img src="' + escAttr(ad.thumbnail) + '" alt="" onerror="this.parentNode.innerHTML=\'&#x1f5bc;&#xfe0f;\'">'
      : '\uD83D\uDDBC\uFE0F';
    html += '<tr onclick="openModal(' + i + ')" style="cursor:pointer">'
      + '<td><div class="thumb-cell">' + thumbHtml + '</div></td>'
      + '<td>' + escHtml(ad.name) + '</td>'
      + '<td>' + escHtml(ad.adset) + '</td>'
      + '<td>' + formatCurrency(ad.spend) + '</td>'
      + '<td>' + ad.roas.toFixed(2) + '</td>'
      + '<td>' + ad.ctr.toFixed(2) + '%</td>'
      + '<td>' + formatCurrency(ad.cpc) + '</td>'
      + '<td>' + ad.frequency.toFixed(2) + '</td>'
      + '<td>' + ad.purchases + '</td>'
      + '<td><span class="badge-status ' + statusBadge.cls + '" style="position:static">' + statusBadge.text + '</span></td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

/* ---- View Toggle ---- */

function setView(view) {
  currentView = view;
  document.getElementById('btnCards').classList.toggle('active', view === 'cards');
  document.getElementById('btnTable').classList.toggle('active', view === 'table');
  document.getElementById('cardsGrid').classList.toggle('hidden', view !== 'cards');
  document.getElementById('tableWrap').classList.toggle('hidden', view !== 'table');
}

/* ---- Modal ---- */

function openModal(index) {
  var ad = adsData[index];
  if (!ad) return;
  var imgHtml = ad.thumbnail
    ? '<img class="modal-img" src="' + escAttr(ad.thumbnail) + '" alt="creative" onerror="this.style.display=\'none\'">'
    : '';
  var html = imgHtml
    + '<div class="modal-title">' + escHtml(ad.name) + '</div>'
    + '<div class="modal-sub">' + escHtml(ad.campaign) + ' &bull; ' + escHtml(ad.adset) + '</div>'
    + '<div class="modal-stats">'
    + modalStat('הוצאה', formatCurrency(ad.spend))
    + modalStat('הכנסה', formatCurrency(ad.revenue))
    + modalStat('ROAS', ad.roas.toFixed(2) + 'x')
    + modalStat('רכישות', ad.purchases.toString())
    + modalStat('חשיפות', ad.impressions.toLocaleString())
    + modalStat('קליקים', ad.clicks.toLocaleString())
    + modalStat('CTR', ad.ctr.toFixed(2) + '%')
    + modalStat('CPC', formatCurrency(ad.cpc))
    + modalStat('Reach', ad.reach.toLocaleString())
    + modalStat('Frequency', ad.frequency.toFixed(2))
    + '</div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function modalStat(label, value) {
  return '<div class="ms"><div class="ms-label">' + label + '</div><div class="ms-value">' + value + '</div></div>';
}

/* ---- Claude AI Analysis ---- */

function runAnalysis() {
  if (!CLAUDE_KEY) {
    alert('יש להזין Claude API Key בעת ההתחברות');
    return;
  }
  if (!WORKER_URL) {
    alert('יש להזין Cloudflare Worker URL בעת ההתחברות');
    return;
  }
  if (adsData.length === 0) {
    alert('אין נתונים לנתח. טען נתונים קודם.');
    return;
  }

  var btn = document.getElementById('analysisBtn');
  btn.disabled = true;
  btn.textContent = '\u23F3 מנתח...';

  var summary = adsData.map(function(ad) {
    return {
      name: ad.name,
      adset: ad.adset,
      campaign: ad.campaign,
      spend: ad.spend.toFixed(2),
      revenue: ad.revenue.toFixed(2),
      roas: ad.roas.toFixed(2),
      purchases: ad.purchases,
      ctr: ad.ctr.toFixed(2),
      cpc: ad.cpc.toFixed(2),
      frequency: ad.frequency.toFixed(2),
      impressions: ad.impressions,
      status: ad.status
    };
  });

  var prompt = 'אתה מומחה פרסום דיגיטלי. נתח את נתוני הקריאייטיבים הבאים מ-Meta Ads וספק ניתוח מקיף בעברית עם הסעיפים הבאים:\n\n'
    + '\uD83C\uDFC6 הקריאייטיבים המנצחים\n'
    + '\uD83D\uDC80 הקריאייטיבים שצריך לעצור\n'
    + '\uD83D\uDCCA תובנות על הקהלים (לפי אדסטים)\n'
    + '\uD83C\uDFAF 5 פעולות מיידיות\n'
    + '\uD83D\uDCA1 רעיונות לקריאייטיבים חדשים\n'
    + '\u26A0\uFE0F אזהרות וסיכונים\n\n'
    + 'הנתונים:\n' + JSON.stringify(summary, null, 2);

  fetch(WORKER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      apiKey: CLAUDE_KEY,
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    btn.disabled = false;
    btn.textContent = '\uD83E\uDD16 \u05E0\u05D9\u05EA\u05D5\u05D7 Claude AI';
    if (json.error) {
      alert('שגיאת Claude: ' + (json.error.message || JSON.stringify(json.error)));
      return;
    }
    var text = (json.content && json.content[0] && json.content[0].text) || 'לא התקבלה תשובה';
    document.getElementById('analysisContent').textContent = text;
    document.getElementById('analysisSection').classList.remove('hidden');
    document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth' });
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.textContent = '\uD83E\uDD16 \u05E0\u05D9\u05EA\u05D5\u05D7 Claude AI';
    alert('שגיאת רשת: ' + err.message);
  });
}

/* ---- Helpers ---- */

function getStatusBadge(status) {
  switch (status) {
    case 'win':  return { cls: 'badge-win',  text: '\uD83D\uDFE2 WIN' };
    case 'ok':   return { cls: 'badge-ok',   text: '\uD83D\uDFE1 OK' };
    case 'stop': return { cls: 'badge-stop', text: '\uD83D\uDD34 STOP' };
    default:     return { cls: 'badge-new',  text: '\u26AA \u05D7\u05D3\u05E9' };
  }
}

function formatCurrency(n) {
  return '\u20AA' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function escHtml(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
